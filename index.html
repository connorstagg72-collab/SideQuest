.chip{padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.02);border:1.5px solid var(--line2);font-weight:600;font-size:13px;color:var(--ink2);display:inline-flex;align-items:center;gap:5px;transition:.16s;white-space:nowrap}
.chip:hover{border-color:var(--primary);color:#fff}
.chip-on{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 18px -6px var(--pglow)}
.chip-mint.chip-on{background:var(--mint);border-color:var(--mint);color:#06231a;box-shadow:0 0 18px -6px rgba(35,232,155,.6)}
.chip-coral.chip-on{background:var(--accent);border-color:var(--accent);color:#2a0a10;box-shadow:0 0 18px -6px rgba(var(--a-rgb),.6)}

/* fields */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field-label{font-weight:700;font-size:12.5px;color:var(--ink2);letter-spacing:.02em;text-transform:uppercase;font-family:var(--disp)}
.field-input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--line2);background:#1A0C10;font-size:14.5px;color:var(--ink);transition:.16s;font-weight:500}
.field-input:focus{outline:none;border-color:var(--primary);background:#200E13;box-shadow:0 0 0 4px rgba(var(--p-rgb),.18)}
.field-area{resize:vertical;line-height:1.5}
.field-hint{font-size:12px;color:var(--muted)}
.pw-wrap{position:relative}
.pw-wrap .field-input{padding-right:44px}
.pw-eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted)}
.pw-eye:hover{color:var(--primary)}
.money-wrap{position:relative;display:flex;align-items:center}
.money-sign{position:absolute;left:14px;font-weight:700;color:var(--gold);font-family:var(--mono)}
.field-money{padding-left:28px;font-family:var(--mono)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* bars */
.bar{width:100%;background:#241016;border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;transition:width .5s cubic-bezier(.2,1,.3,1)}
.bar-primary{background:linear-gradient(90deg,var(--primary-d),var(--accent));box-shadow:0 0 12px -2px var(--pglow)}
.bar-mint{background:linear-gradient(90deg,#17b377,#23E89B);box-shadow:0 0 12px -2px rgba(35,232,155,.5)}

/* status + tags */
.sbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;font-family:var(--disp)}
.sbadge-open{background:var(--primary-l);color:#ff7e92;border:1px solid var(--line2)}
.sbadge-claimed{background:var(--cyan-l);color:var(--cyan);border:1px solid #0c3d49}
.sbadge-done{background:var(--mint-l);color:var(--mint);border:1px solid #103f2e}
.sbadge-refunded{background:var(--mint-l);color:var(--mint);border:1px solid #103f2e}
.cat-tag{font-size:11.5px;font-weight:700;color:#ff8ea0;background:var(--primary-l);padding:4px 11px;border-radius:999px;border:1px solid var(--line2);text-transform:uppercase;letter-spacing:.03em;font-family:var(--disp)}
.effort{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;font-family:var(--disp)}
.effort-light{background:var(--mint-l);color:var(--mint)}
.effort-medium{background:var(--gold-l);color:var(--gold)}
.effort-heavy{background:var(--accent-l);color:var(--accent)}
.match-tag{font-size:10.5px;font-weight:700;color:#fff;background:linear-gradient(120deg,var(--primary),var(--ember));padding:4px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:3px;text-transform:uppercase;letter-spacing:.03em;box-shadow:0 0 14px -4px var(--pglow);font-family:var(--disp)}
.countdown{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--ink2);font-family:var(--mono)}
.cd-soon{color:var(--gold)}
.cd-urgent{color:var(--accent);animation:pulse 1.2s ease-in-out infinite;text-shadow:0 0 10px rgba(var(--a-rgb),.7)}
.cd-over{color:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ===== AUTH ===== */
.auth{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;position:relative;z-index:2}
.auth-pitch{padding:56px clamp(32px,5vw,72px);display:flex;flex-direction:column;justify-content:center;gap:22px}
.hero-h{font-family:var(--disp);font-size:clamp(38px,5.2vw,62px);line-height:1.02;font-weight:700;letter-spacing:-.01em;text-shadow:0 2px 30px rgba(var(--p-rgb),.25)}
.hero-h em{background:linear-gradient(100deg,var(--accent),var(--primary) 55%,var(--ember));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;filter:drop-shadow(0 0 16px rgba(var(--p-rgb),.45))}
.hero-p{font-size:17px;line-height:1.6;color:var(--ink2);max-width:480px}
.hero-p strong{color:#fff;font-weight:700}
.frows{display:flex;flex-direction:column;gap:14px;margin-top:6px}
.frow{display:flex;gap:13px;align-items:flex-start}
.frow-ic{width:38px;height:38px;flex:none;border-radius:11px;background:var(--card2);border:1.5px solid var(--line2);display:grid;place-items:center;color:var(--primary);box-shadow:0 0 18px -10px var(--pglow)}
.frow-t{font-weight:700;font-size:15px;letter-spacing:.005em;font-family:var(--disp)}
.frow-b{font-size:13.5px;color:var(--ink2);line-height:1.45}

.auth-panel{background:linear-gradient(180deg,#150A0E,#0E0709);border-left:1px solid var(--line);padding:48px clamp(28px,4vw,56px);display:flex;flex-direction:column;justify-content:center;gap:18px;box-shadow:-40px 0 80px -50px rgba(var(--p-rgb),.4)}
.shake{animation:shake .42s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:5px;background:#1A0C10;padding:5px;border-radius:13px;border:1px solid var(--line)}
.seg button{padding:11px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--ink2);display:flex;align-items:center;justify-content:center;gap:7px;transition:.18s;font-family:var(--disp)}
.seg button.on{background:linear-gradient(120deg,var(--primary),var(--accent));color:#fff;box-shadow:0 0 20px -6px var(--pglow)}
.seg-mode button.on{background:var(--card2);color:#fff;box-shadow:none;border:1px solid var(--line2)}
.auth-fields{display:flex;flex-direction:column;gap:2px}
.auth-err{display:flex;align-items:center;gap:7px;background:var(--accent-l);color:#ff8ea0;padding:10px 13px;border-radius:11px;font-weight:600;font-size:13.5px;margin:6px 0 12px;border:1px solid #7a1228}
.auth-err.sm{margin:8px 0;padding:8px 11px;font-size:12.5px}
.demo-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:13.5px;color:var(--muted);font-weight:600}
.demo-row button{font-weight:700;color:#ff8ea0;background:var(--primary-l);padding:6px 12px;border-radius:9px;font-size:13px;transition:.16s;border:1px solid var(--line2);font-family:var(--disp)}
.demo-row button:hover{background:#34101a;border-color:var(--primary-d);color:#fff}
.auth-fine{font-size:12px;color:var(--muted);text-align:center;margin-top:2px}
.cfg-list{list-style:none;display:flex;flex-direction:column;gap:14px;margin:4px 0 16px;padding:0}
.cfg-item{display:flex;gap:13px;align-items:flex-start}
.cfg-num{flex:none;width:26px;height:26px;border-radius:9px;display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--primary);background:var(--primary-l);border:1px solid var(--line2)}
.cfg-t{font-weight:700;font-size:14.5px;color:var(--ink);margin-bottom:2px}
.cfg-b{font-size:13px;line-height:1.5;color:var(--ink2)}
.cfg-reload{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:13px;border:1px solid var(--line2);background:linear-gradient(180deg,var(--primary),var(--primary-d));color:#fff;font-family:var(--font);font-weight:700;font-size:14.5px;cursor:pointer;box-shadow:var(--glow);transition:transform .12s ease,filter .12s ease}
.cfg-reload:hover{filter:brightness(1.07)}
.cfg-reload:active{transform:translateY(1px)}

/* location + payments UI */
.loc-input{display:flex;gap:8px;align-items:stretch}
.loc-input .field-input{flex:1}
.loc-btn{flex:none;width:44px;border-radius:12px;border:1px solid var(--line2);background:var(--card2);color:var(--primary);display:grid;place-items:center;cursor:pointer;transition:background .12s ease,transform .1s ease}
.loc-btn:hover{background:var(--primary-l)}
.loc-btn:active{transform:translateY(1px)}
.loc-btn:disabled{opacity:.5;cursor:default}
.pay-note{font-size:12px;color:var(--muted);text-align:center;margin:8px 0 0}
.announce-bar{max-width:1144px;margin:12px auto 0;width:calc(100% - 32px);display:flex;gap:9px;align-items:center;background:var(--gold-l);border:1px solid #3a2a0e;color:var(--gold);font-size:13px;font-weight:600;padding:10px 14px;border-radius:12px;line-height:1.4;position:relative;z-index:2}
.announce-bar svg{flex:0 0 auto}
.net-hint{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--mint);margin:-2px 0 6px;font-weight:600}
.net-hint svg{flex:0 0 auto}
.admin-preview{display:flex;gap:7px;align-items:center;margin:8px 0 0;padding:9px 11px;border-radius:11px;background:rgba(35,232,155,.10);border:1px solid rgba(35,232,155,.28);color:var(--ink2);font-size:12.5px;line-height:1.4}
.admin-preview svg{flex:0 0 auto;color:var(--mint)}
.admin-preview strong{color:var(--mint)}
.pm-admin svg{color:var(--gold)}
.refund-note{display:flex;gap:8px;align-items:flex-start;margin:12px 0 2px;padding:10px 12px;border-radius:12px;background:rgba(35,232,155,.10);border:1px solid rgba(35,232,155,.30);color:var(--ink2);font-size:12.5px;line-height:1.45}
.refund-note svg{flex:0 0 auto;margin-top:1px;color:var(--mint)}
.refund-note strong{color:var(--mint);font-weight:700}
.refund-note-sm{margin:8px 0 0;padding:7px 10px;font-size:11.5px;border-radius:10px}
.pay-hint{display:flex;gap:10px;align-items:flex-start;background:var(--mint-l);border:1px solid #103f2e;border-radius:13px;padding:11px 14px;font-size:12.5px;line-height:1.5;color:var(--ink2);font-weight:500}
.pay-hint-ic{flex:none;width:24px;height:24px;border-radius:8px;background:var(--mint);color:#06231a;display:grid;place-items:center;margin-top:1px}
.pay-hint strong{color:var(--mint);font-weight:800}
.pay-hint .linklike{color:var(--mint)}
.dist-i{color:var(--mint)!important;font-weight:700}
.loc-bar{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:12px}
.loc-bar-row{display:flex;align-items:center;gap:8px;color:var(--muted)}
.loc-bar-input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-family:var(--font);font-size:14px;font-weight:600}
.loc-bar-input::placeholder{color:var(--muted)}
.loc-mini{flex:none;border:1px solid var(--line2);background:var(--card2);color:var(--ink);font-family:var(--font);font-weight:700;font-size:13px;padding:7px 12px;border-radius:10px;cursor:pointer;display:grid;place-items:center}
.loc-mini.ghost{color:var(--primary);padding:7px 10px}
.loc-mini:hover{border-color:var(--primary)}
.loc-mini:disabled{opacity:.5;cursor:default}
.radius-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.rad-check{display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:700;color:var(--ink2);cursor:pointer;white-space:nowrap}
.rad-check input{width:16px;height:16px;accent-color:var(--primary)}
.rad-range{flex:1;accent-color:var(--primary)}
.rad-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--primary);white-space:nowrap;min-width:46px;text-align:right}
.cashout-box{background:var(--primary-l);border:1px solid var(--line2);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.cashout-amt{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--mint);line-height:1}
.cashout-sub{font-size:12.5px;color:var(--muted);margin-top:5px;font-weight:600}
.linklike{background:none;border:none;padding:0;color:var(--primary);font:inherit;font-weight:700;cursor:pointer;text-decoration:underline}

/* release / can't-finish */
.note-strip{display:flex;gap:8px;align-items:flex-start;background:var(--gold-l);border:1px solid #3a2a0e;color:var(--gold);border-radius:11px;padding:9px 12px;font-size:12.5px;font-weight:600;line-height:1.45;margin-top:2px}
.note-strip svg{flex:none;margin-top:1px}
.note-strip strong{font-weight:800}
.giveup{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.giveup-link{background:none;border:none;color:var(--muted);font:inherit;font-weight:600;font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.giveup-link:hover{color:var(--ink2)}
.giveup-box{display:flex;flex-direction:column;gap:8px;animation:rise .25s}
.giveup-h{display:flex;align-items:flex-start;gap:7px;font-size:13px;color:var(--ink2);font-weight:600;line-height:1.45;margin-bottom:2px}
.giveup-h svg{flex:none;margin-top:1px;color:var(--primary)}
.giveup-note{resize:vertical;min-height:62px;font-family:var(--font);line-height:1.45}
.giveup-actions{display:flex;gap:8px;justify-content:flex-end}

/* payout info */
.payout-info{display:flex;flex-direction:column;gap:9px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-top:10px}
.pi-row{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--ink2);line-height:1.5}
.pi-row svg{flex:none;margin-top:2px;color:var(--mint)}
.pi-row strong{color:var(--ink);font-weight:700}
.pi-row em{color:var(--primary);font-style:normal;font-weight:700}

/* appearance swatches */
.swatches{display:flex;flex-wrap:wrap;gap:10px;margin:4px 0 6px}
.swatch{width:38px;height:38px;border-radius:50%;border:2px solid var(--line2);background:var(--card2);display:grid;place-items:center;cursor:pointer;transition:transform .12s ease,border-color .15s ease;position:relative}
.swatch:hover{transform:scale(1.08)}
.swatch.on{border-color:var(--ink);box-shadow:0 0 0 3px var(--card),0 0 16px -4px var(--pglow)}
.sw-dot{width:24px;height:24px;border-radius:50%;box-shadow:inset 0 0 8px rgba(0,0,0,.35)}
.sw-custom{overflow:hidden}
.sw-custom .sw-plus{color:var(--ink2);display:grid;place-items:center;pointer-events:none}
.sw-custom input[type=color]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0}

/* per-project chat */
.chat{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.chat-toggle{display:flex;align-items:center;gap:8px;width:100%;background:var(--card2);border:1px solid var(--line2);border-radius:11px;padding:10px 13px;font-family:var(--disp);font-weight:700;font-size:13.5px;color:var(--ink2);cursor:pointer;transition:.15s}
.chat-toggle:hover{border-color:var(--primary);color:var(--ink)}
.chat-toggle.open{color:var(--primary)}
.chat-toggle>svg:first-child{color:var(--primary);flex:none}
.chat-chev{margin-left:auto;transition:transform .2s;flex:none}
.chat-toggle.open .chat-chev{transform:rotate(90deg)}
.chat-body{margin-top:8px;border:1px solid var(--line2);border-radius:13px;background:var(--void);overflow:hidden;animation:rise .25s}
.chat-msgs{display:flex;flex-direction:column;gap:7px;padding:12px;max-height:300px;overflow-y:auto}
.chat-empty{text-align:center;color:var(--muted);font-size:13px;padding:18px 0;font-weight:500}
.bubble{max-width:82%;align-self:flex-start;display:flex;flex-direction:column;gap:2px;background:var(--card2);border:1px solid var(--line);padding:8px 12px;border-radius:14px;border-bottom-left-radius:4px}
.bubble.mine{align-self:flex-end;background:var(--primary-l);border-color:var(--line2);border-bottom-left-radius:14px;border-bottom-right-radius:4px}
.bubble-name{font-size:11px;font-weight:800;color:var(--primary);font-family:var(--disp)}
.bubble-text{font-size:14px;line-height:1.4;color:var(--ink);word-break:break-word;white-space:pre-wrap}
.chat-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);background:var(--card)}
.chat-input input{flex:1;background:var(--void);border:1.5px solid var(--line2);border-radius:11px;padding:10px 13px;font-size:14px;color:var(--ink);outline:none}
.chat-input input:focus{border-color:var(--primary)}
.chat-send{flex:none;width:42px;border-radius:11px;background:var(--primary);color:#fff;display:grid;place-items:center;cursor:pointer;transition:.15s}
.chat-send:hover{filter:brightness(1.1)}
.chat-send:active{transform:translateY(1px)}

/* support: FAQ accordion */
.faq{display:flex;flex-direction:column;gap:7px;margin-top:2px}
.faq-item{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card2)}
.faq-item.open{border-color:var(--line2)}
.faq-q{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;padding:12px 14px;cursor:pointer;font-weight:700;font-size:13.5px;color:var(--ink);font-family:var(--disp)}
.faq-q:hover{color:var(--primary)}
.faq-chev{flex:0 0 auto;color:var(--muted);transition:transform .18s}
.faq-item.open .faq-chev{transform:rotate(180deg);color:var(--primary)}
.faq-a{padding:0 14px 13px;font-size:13.5px;line-height:1.5;color:var(--ink2);animation:rise .18s}
/* support chat shell */
.support-chat{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card);margin-top:4px}
.support-msgs{max-height:340px}
.support-msgs.tall{max-height:420px}
/* admin support inbox */
.sup-list{display:flex;flex-direction:column;gap:4px}
.sup-row{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px;border-radius:12px;cursor:pointer;transition:.12s}
.sup-row:hover{background:var(--card2)}
.sup-ava{flex:none;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:var(--primary-l);color:var(--primary);font-weight:800;font-family:var(--disp);text-transform:uppercase}
.sup-ava.lg{width:46px;height:46px;font-size:18px}
.sup-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.sup-name{font-weight:700;font-size:14px;color:var(--ink);font-family:var(--disp);display:flex;align-items:center;gap:7px}
.sup-last{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sup-dot{flex:none;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center}
.sup-chev{flex:none;color:var(--muted)}
.sup-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--ink2);font-weight:700;font-size:13px;cursor:pointer;padding:2px 0;font-family:var(--disp)}
.sup-back:hover{color:var(--primary)}
.sup-head{display:flex;align-items:center;gap:11px;margin:8px 0 4px}
.sup-email{font-size:12.5px;color:var(--muted)}
/* admin access management */
.grant-row{display:flex;gap:8px;align-items:stretch;margin-top:2px}
.grant-row .field-input{flex:1}
.admin-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.admin-empty{font-size:13px;color:var(--muted);padding:4px 2px}
.admin-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--line);border-radius:11px;background:var(--card2)}
.admin-ava{flex:none;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--gold-l);color:var(--gold)}
.admin-meta{flex:1;min-width:0;display:flex;flex-direction:column}
.admin-name{font-weight:700;font-size:13.5px;color:var(--ink);font-family:var(--disp);display:flex;align-items:center;gap:7px}
.admin-you{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--mint);background:var(--mint-l);padding:1px 6px;border-radius:6px}
.admin-mail{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-locked{font-size:11.5px;color:var(--muted);font-style:italic}
.admin-revoke{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid var(--line2);color:var(--ink2);font-weight:700;font-size:12px;padding:5px 9px;border-radius:9px;cursor:pointer;transition:.12s;font-family:var(--disp)}
.admin-revoke:hover{border-color:var(--accent);color:var(--accent);background:var(--primary-l)}
/* delete account danger zone */
.danger-card{border-color:#3a1620}
.danger-h{color:var(--accent)}
.danger-h svg{color:var(--accent)}
.del-warn{display:flex;gap:8px;align-items:flex-start;font-size:13px;line-height:1.45;color:var(--gold);background:var(--gold-l);border:1px solid #3a2a0e;border-radius:11px;padding:10px 12px;margin:4px 0;font-weight:600}
.del-warn svg{flex:0 0 auto;margin-top:1px}
.del-confirm{margin-top:4px;padding:12px;border:1px solid #3a1620;border-radius:12px;background:var(--primary-l);animation:rise .2s}
.del-q{font-size:13.5px;line-height:1.5;color:var(--ink);margin-bottom:10px}
.del-actions{display:flex;gap:8px;flex-wrap:wrap}
/* unread badge on profile-menu links */
.pm-link{position:relative}
.pm-link-badge{margin-left:auto;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center}

/* ===== schedule: calendar ===== */
.sched-page{display:flex;flex-direction:column;gap:14px}
.cal-card{display:flex;flex-direction:column;gap:9px}
.cal-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cal-title{font-family:var(--disp);font-weight:800;font-size:16px;color:var(--ink)}
.cal-nav{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--card2);border:1px solid var(--line);color:var(--ink2);cursor:pointer;transition:.12s}
.cal-nav:hover{border-color:var(--primary);color:var(--primary)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-wd{margin-bottom:-2px}
.cal-wd-c{text-align:center;font-size:11px;font-weight:800;color:var(--muted);font-family:var(--disp);padding:2px 0}
.cal-cell{position:relative;aspect-ratio:1/1;border-radius:10px;border:1px solid transparent;background:var(--card2);color:var(--ink2);font-weight:700;font-size:13.5px;font-family:var(--disp);cursor:pointer;display:grid;place-items:center;transition:.12s}
.cal-cell:hover{border-color:var(--line2);color:var(--ink)}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{color:var(--mint);border-color:var(--mint)}
.cal-cell.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
.cal-cell.sel.today{color:#fff}
.cal-dot{position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.cal-cell.sel .cal-dot{background:#fff}
.cal-today{align-self:flex-start;background:none;border:none;color:var(--primary);font-weight:700;font-size:12.5px;cursor:pointer;font-family:var(--disp);padding:2px 0}
.cal-today:hover{text-decoration:underline}
/* ===== schedule: day timeline ===== */
.day-card{display:flex;flex-direction:column;gap:8px}
.day-head{display:flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:800;font-size:15px;color:var(--ink)}
.day-head svg{color:var(--primary)}
.day-empty{font-size:13.5px;color:var(--muted);line-height:1.5;padding:6px 2px}
.day-other{display:flex;flex-direction:column;gap:6px;padding:8px;border:1px dashed var(--line2);border-radius:12px}
.day-other-h{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.hours{display:flex;flex-direction:column;max-height:460px;overflow-y:auto;border:1px solid var(--line);border-radius:12px}
.hour-row{display:flex;gap:10px;padding:5px 8px;border-bottom:1px solid var(--line);min-height:34px}
.hour-row:last-child{border-bottom:none}
.hour-row.has{background:var(--card2)}
.hour-label{flex:0 0 52px;font-size:11.5px;font-weight:700;color:var(--muted);font-family:var(--disp);padding-top:5px}
.hour-slot{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.tl-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:11px;background:var(--card);border:1px solid var(--line2);border-left:3px solid var(--primary)}
.tl-item.due{border-left-color:var(--gold)}
.tl-time{flex:0 0 auto;font-size:12px;font-weight:800;color:var(--ink2);font-family:var(--mono, var(--disp))}
.tl-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.tl-title{font-weight:700;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rem-hint{display:flex;gap:7px;align-items:flex-start;font-size:12.5px;color:var(--ink2);background:var(--card2);border-radius:10px;padding:9px 11px;margin-top:4px;line-height:1.45}
.rem-hint svg{flex:0 0 auto;margin-top:1px;color:var(--gold)}
/* ===== schedule: kanban to-do ===== */
.kb-card{display:flex;flex-direction:column;gap:8px}
.kb{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kb-lane{display:flex;flex-direction:column;gap:7px;background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:8px;min-height:120px;transition:.12s}
.kb-lane.over{border-color:var(--primary);background:var(--primary-l)}
.kb-lane-h{display:flex;align-items:center;justify-content:space-between;font-family:var(--disp);font-weight:800;font-size:12.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.03em;padding:0 2px}
.kb-count{min-width:18px;height:18px;border-radius:9px;background:var(--card);border:1px solid var(--line2);color:var(--muted);font-size:11px;display:grid;place-items:center}
.kb-cards{display:flex;flex-direction:column;gap:6px;min-height:30px}
.kb-empty{font-size:11.5px;color:var(--muted);text-align:center;padding:10px 4px;border:1px dashed var(--line2);border-radius:9px}
.kb-item{display:flex;align-items:flex-start;gap:6px;padding:8px 9px;border-radius:10px;background:var(--card);border:1px solid var(--line2);cursor:grab;transition:.12s}
.kb-item:hover{border-color:var(--primary)}
.kb-item.dragging{opacity:.45}
.kb-grip{flex:0 0 auto;color:var(--muted);cursor:grab;margin-top:1px}
.kb-body{flex:1;min-width:0;font-size:13px;line-height:1.35;color:var(--ink);word-break:break-word}
.kb-x{flex:0 0 auto;color:var(--muted);background:none;border:none;cursor:pointer;padding:1px;border-radius:6px;opacity:.6;transition:.12s}
.kb-x:hover{opacity:1;color:var(--accent)}
.kb-add{display:flex;gap:5px;margin-top:2px}
.kb-add input{flex:1;min-width:0;background:var(--void);border:1.5px solid var(--line2);border-radius:9px;padding:7px 9px;font-size:12.5px;color:var(--ink);outline:none}
.kb-add input:focus{border-color:var(--primary)}
.kb-add-btn{flex:0 0 auto;width:32px;border-radius:9px;background:var(--card);border:1px solid var(--line2);color:var(--ink2);display:grid;place-items:center;cursor:pointer;transition:.12s}
.kb-add-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.kb-tip{font-size:11.5px;color:var(--muted);line-height:1.45}
@media (max-width:560px){
  .kb{grid-template-columns:1fr;gap:10px}
  .cal-card,.day-card,.kb-card{padding:14px}
  .cal-grid{gap:3px}
  .cal-cell{min-width:0;font-size:12.5px;border-radius:8px}
  .cal-wd-c{font-size:10px}
  .cal-title{font-size:15px}
  .cal-nav{width:32px;height:32px}
  .cal-dot{bottom:4px;width:4px;height:4px}
  .hours{max-height:360px}
  .hour-row{gap:8px;padding:5px 7px}
  .hour-label{flex-basis:44px;font-size:11px}
  .tl-item{padding:7px 8px;gap:8px}
  .tl-time{font-size:11px}
  .urgent-sec{padding:11px}
  .urgent-h{font-size:15px}
}

/* ===== browse: urgently need covered ===== */
.urgent-sec{margin:2px 0 4px;padding:13px;border-radius:16px;background:linear-gradient(180deg,var(--gold-l),transparent 70%);border:1px solid #3a2a0e}
.urgent-h{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:800;font-size:17px;color:var(--gold)}
.urgent-pip{flex:0 0 auto;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:var(--gold);color:#1a1206;animation:pulseUrg 1.8s ease-in-out infinite}
@keyframes pulseUrg{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.urgent-count{min-width:22px;height:22px;padding:0 6px;border-radius:11px;background:var(--gold);color:#1a1206;font-size:12.5px;font-weight:800;display:grid;place-items:center}
.urgent-sub{font-size:12.5px;color:var(--ink2);line-height:1.45;margin:5px 0 11px}
.urgent-sec .jobgrid{margin:0}
.browse-urgent{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 6px 22px -12px rgba(245,180,40,.5)}
.urgent-ribbon{display:flex;align-items:center;gap:6px;margin:-2px 0 8px;font-size:11.5px;font-weight:800;font-family:var(--disp);color:var(--gold);text-transform:uppercase;letter-spacing:.03em}
.urgent-ribbon svg{flex:0 0 auto}

/* ===== city scoreboard ===== */
.score-card{display:flex;flex-direction:column;gap:12px}
.score-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
.score-sub{font-size:12px;color:var(--muted);font-weight:600}
.score-loading{font-size:13.5px;color:var(--muted);padding:8px 2px}
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-items:end}
.pod{display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;padding:13px 8px;border-radius:14px;border:1px solid var(--line2);background:var(--card2);min-width:0}
.pod-1{background:linear-gradient(180deg,rgba(245,190,40,.18),var(--card2));border-color:var(--gold);padding-top:18px}
.pod-2{background:linear-gradient(180deg,rgba(200,205,215,.14),var(--card2));border-color:#9aa3b2}
.pod-3{background:linear-gradient(180deg,rgba(205,127,50,.16),var(--card2));border-color:#b9763a}
.pod.me{box-shadow:0 0 0 2px var(--primary)}
.pod-medal{font-size:26px;line-height:1}
.pod-1 .pod-medal{font-size:32px}
.pod-title{font-family:var(--disp);font-weight:800;font-size:11.5px;letter-spacing:.01em}
.pod-1 .pod-title{color:var(--gold)}
.pod-2 .pod-title{color:#c4ccd8}
.pod-3 .pod-title{color:#d98f52}
.pod-name{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.pod-earn{font-family:var(--mono,var(--disp));font-weight:800;font-size:14px;color:var(--mint)}
.score-list{display:flex;flex-direction:column;gap:4px;margin-top:2px}
.score-row{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;background:var(--card2);border:1px solid var(--line)}
.score-row.me{border-color:var(--primary);background:var(--primary-l)}
.score-rank{flex:0 0 auto;width:24px;text-align:center;font-family:var(--disp);font-weight:800;font-size:13px;color:var(--muted)}
.score-name{flex:1;min-width:0;font-weight:700;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-earn{flex:0 0 auto;font-family:var(--mono,var(--disp));font-weight:800;font-size:13.5px;color:var(--mint)}
.score-you{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink2);background:var(--primary-l);border:1px solid var(--line2);border-radius:11px;padding:10px 12px}
.score-you svg{flex:0 0 auto;color:var(--gold)}
.score-aw-h{font-family:var(--disp);font-weight:800;font-size:13px;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-top:6px}
.score-awards{display:flex;flex-direction:column;gap:7px}
.aw{display:flex;align-items:center;gap:11px;padding:11px;border-radius:13px;background:var(--card2);border:1px solid var(--line2)}
.aw.me{box-shadow:0 0 0 1px var(--primary)}
.aw-ic{flex:0 0 auto;width:34px;height:34px;border-radius:10px;display:grid;place-items:center}
.aw-mach .aw-ic{background:var(--cyan-l);color:var(--cyan)}
.aw-streak .aw-ic{background:var(--gold-l);color:var(--gold)}
.aw-xp .aw-ic{background:var(--primary-l);color:var(--primary)}
.aw-meta{flex:1;min-width:0}
.aw-title{font-family:var(--disp);font-weight:800;font-size:13.5px;color:var(--ink)}
.aw-sub{font-size:11.5px;color:var(--muted)}
.aw-win{flex:0 0 auto;text-align:right;min-width:0}
.aw-who{font-weight:700;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.aw-stat{font-size:11px;color:var(--ink2)}
@media (max-width:560px){
  .pod{padding:10px 5px}
  .pod-medal{font-size:22px}
  .pod-1 .pod-medal{font-size:27px}
  .pod-title{font-size:10px}
  .pod-name{font-size:11.5px}
  .pod-earn{font-size:12.5px}
  .aw-who{max-width:84px}
}

/* new-quest notification settings */
.njobs{margin-top:10px;padding-top:12px;border-top:1px solid var(--line)}
.njobs-scope{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0 2px;padding-left:2px}
.njobs-scope-l{font-size:12.5px;font-weight:700;color:var(--ink2);font-family:var(--disp)}
.njobs-note{display:flex;align-items:flex-start;gap:7px;font-size:12px;line-height:1.45;color:var(--muted);background:var(--card2);border-radius:10px;padding:9px 11px;margin-top:9px}
.njobs-note svg{flex:0 0 auto;margin-top:1px;color:var(--gold)}

/* proof photos + review */
.proof-up{margin-top:6px;display:flex;flex-direction:column;gap:8px}
.proof-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.proof-thumb{position:relative;width:84px;height:84px;border-radius:11px;overflow:hidden;border:1px solid var(--line2);background:var(--void);flex:none;display:block}
.proof-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.proof-thumb.loadingthumb{display:grid;place-items:center;color:var(--muted)}
.proof-rm{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(5,2,3,.78);color:#fff;display:grid;place-items:center;cursor:pointer;border:1px solid var(--line2)}
.proof-rm:hover{background:var(--primary)}
.proof-add{width:84px;height:84px;border-radius:11px;border:1.5px dashed var(--line2);background:var(--card2);color:var(--ink2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:11px;font-weight:700;font-family:var(--disp);transition:.15s}
.proof-add:hover{border-color:var(--primary);color:var(--primary)}
.proof-add:disabled{opacity:.6;cursor:default}
.review-box{display:flex;flex-direction:column;gap:10px;margin-top:2px}
.review-wait{color:var(--gold)!important;background:var(--gold-l)!important;border-color:#3a2a0e!important}
.review-strip{color:var(--cyan);background:var(--cyan-l);border-color:#0c3d49}
.review-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.review-changes{display:flex;flex-direction:column;gap:8px}
.review-changes textarea{resize:vertical;min-height:54px;font-family:var(--font);line-height:1.45}
.sbadge-review{background:var(--gold-l);color:var(--gold);border:1px solid #3a2a0e}

/* ===== NAV ===== */
.nav{position:sticky;top:0;z-index:40;background:rgba(12,6,8,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:1160px;margin:0 auto;padding:12px clamp(16px,3vw,28px);display:flex;align-items:center;gap:16px}
.nav-tabs{display:flex;gap:4px;margin-left:6px;background:#1A0C10;padding:5px;border-radius:13px;overflow-x:auto;border:1px solid var(--line)}
.nav-tabs::-webkit-scrollbar{height:0}
.nav-tab{display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;font-weight:700;font-size:13px;color:var(--ink2);transition:.16s;white-space:nowrap;font-family:var(--disp)}
.nav-tab:hover{color:#fff}
.nav-tab.on{background:linear-gradient(120deg,var(--primary),var(--accent));color:#fff;box-shadow:0 0 18px -6px var(--pglow)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:9px}
.nav-ava{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:grid;place-items:center;font-weight:700;font-size:15px;text-transform:uppercase;box-shadow:0 0 18px -6px var(--pglow);font-family:var(--disp)}

/* profile dropdown */
.profile-menu{position:relative}
.nav-user{position:relative;display:block;border-radius:50%;cursor:pointer;transition:.15s}
.nav-user:hover{transform:translateY(-1px)}
.nav-user.on .nav-ava,.nav-user:hover .nav-ava{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--primary)}
.notif-badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--primary);color:#fff;font-size:11px;font-weight:800;font-family:var(--disp);display:grid;place-items:center;border:2px solid var(--bg);box-shadow:0 0 10px -2px var(--pglow)}
.pm-pop{position:absolute;top:calc(100% + 10px);right:0;width:312px;max-width:86vw;background:var(--card);border:1px solid var(--line2);border-radius:16px;box-shadow:0 24px 60px -16px rgba(0,0,0,.7);padding:8px;z-index:120;animation:rise .18s ease}
.pm-head{display:flex;align-items:center;gap:11px;padding:10px 10px 12px}
.nav-ava.lg{width:46px;height:46px;font-size:18px;flex:none}
.pm-mode{display:flex;align-items:center;gap:9px;width:100%;margin:0 0 4px;padding:11px 12px;border-radius:11px;background:var(--primary-l);border:1px solid var(--line2);color:var(--ink);font-family:var(--disp);font-weight:700;font-size:13px;cursor:pointer;transition:.14s}
.pm-mode:hover{border-color:var(--primary)}
.pm-mode svg{color:var(--primary);flex:none}
.pm-mode strong{color:var(--primary);font-weight:800}
.pm-id{min-width:0}
.pm-name{font-family:var(--disp);font-weight:800;font-size:15px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm-sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.pm-sect-t{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 10px 5px;font-family:var(--disp)}
.pm-notifs{display:flex;flex-direction:column;gap:2px;max-height:230px;overflow-y:auto}
.pm-notif{display:flex;align-items:center;border-radius:10px;transition:.12s}
.pm-notif:hover{background:var(--card2)}
.pm-ntap{flex:1;display:flex;align-items:center;gap:10px;padding:9px 4px 9px 10px;cursor:pointer;text-align:left;min-width:0;background:none}
.pm-nx{flex:none;width:26px;height:26px;margin-right:6px;border-radius:7px;display:grid;place-items:center;color:var(--muted);cursor:pointer;opacity:.5;transition:.12s}
.pm-nx:hover{opacity:1;background:var(--line);color:var(--ink)}
.pm-sect-row{display:flex;align-items:center;justify-content:space-between}
.pm-clear{font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-transform:none;letter-spacing:0;font-family:var(--font);padding:2px 5px;border-radius:6px;transition:.12s}
.pm-clear:hover{color:var(--primary);background:var(--card2)}
.pm-nic{flex:none;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:var(--card2)}
.pm-nic.tone-gold{background:var(--gold-l);color:var(--gold)}
.pm-nic.tone-cyan{background:var(--cyan-l);color:var(--cyan)}
.pm-nic.tone-mint{background:var(--mint-l);color:var(--mint)}
.pm-nic.tone-primary{background:var(--primary-l);color:var(--primary)}
.pm-nic.tone-muted{background:var(--card2);color:var(--ink2)}
.pm-ntext{flex:1;font-size:12.8px;line-height:1.35;color:var(--ink2);font-weight:500;min-width:0}
.pm-empty{padding:12px 10px 14px;text-align:center;color:var(--muted);font-size:13px;font-weight:500}
.pm-links{display:flex;flex-direction:column;gap:1px;border-top:1px solid var(--line);margin-top:6px;padding-top:6px}
.pm-link{display:flex;align-items:center;gap:11px;padding:10px;border-radius:10px;cursor:pointer;text-align:left;width:100%;font-weight:600;font-size:13.5px;color:var(--ink2);font-family:var(--disp);transition:.12s}
.pm-link:hover{background:var(--card2);color:var(--ink)}
.pm-link svg{color:var(--muted)}
.pm-link:hover svg{color:var(--primary)}
.pm-link.danger:hover{background:var(--primary-l);color:var(--accent)}
.pm-link.danger:hover svg{color:var(--accent)}

/* ===== PAGE ===== */
.main{max-width:1160px;margin:0 auto;padding:clamp(20px,3vw,38px) clamp(16px,3vw,28px) 80px;position:relative;z-index:2;overflow-x:clip}
.page{display:flex;flex-direction:column;gap:20px;animation:rise .5s cubic-bezier(.2,1,.3,1)}
.page-narrow{max-width:600px}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.page-head h1{font-family:var(--disp);font-size:clamp(26px,3.4vw,36px);font-weight:700;letter-spacing:0}
.page-head p{color:var(--ink2);font-size:15px;margin-top:3px}
.head-flex{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.sub-h{font-family:var(--disp);font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px;margin-top:8px;color:var(--ink2)}

/* stats */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:13px;box-shadow:var(--sh-sm)}
.stat-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:#fff}
.stat-primary .stat-ic{background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 0 18px -6px var(--pglow)}
.stat-cyan .stat-ic{background:linear-gradient(135deg,#1796b3,#2BD6EE);box-shadow:0 0 18px -6px rgba(43,214,238,.5)}
.stat-mint .stat-ic{background:linear-gradient(135deg,#17b377,#23E89B);box-shadow:0 0 18px -6px rgba(35,232,155,.5)}
.stat-val{font-family:var(--mono);font-size:23px;font-weight:700;line-height:1;color:#fff}
.stat-lab{font-size:12px;color:var(--ink2);font-weight:600;margin-top:3px}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:var(--sh-sm)}
.card-head{display:flex;align-items:center;gap:9px;color:var(--primary)}
.card-head h2{font-family:var(--disp);font-size:19px;font-weight:700;color:#fff;letter-spacing:0}
.card-sub{color:var(--ink2);font-size:13.5px;margin:4px 0 16px}
.post-card{max-width:720px}

.jobgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.jobcard{display:flex;flex-direction:column;gap:10px;transition:transform .18s cubic-bezier(.2,1,.3,1),box-shadow .2s,border-color .2s;padding:20px;position:relative}
.stim-high .jobcard:hover{transform:translateY(-4px);box-shadow:var(--sh),0 0 30px -12px var(--pglow);border-color:var(--line2)}
.jobcard-completed{opacity:.82}
.jc-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.jc-title{font-family:var(--disp);font-size:17.5px;font-weight:700;line-height:1.25;letter-spacing:0;color:#fff}
.jc-desc{font-size:13.5px;color:var(--ink2);line-height:1.5}
.jc-meta{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:2px}
.meta-i{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--ink2);font-weight:600}
.payout{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:16px}
.payout-big{font-family:var(--mono);font-weight:700;font-size:30px;color:var(--gold);letter-spacing:-.01em;line-height:1;text-shadow:0 0 18px rgba(255,194,75,.35)}
.payout-big span{font-size:13px;color:var(--muted);font-weight:600;margin-left:4px;font-family:var(--font)}
.claim-strip{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--cyan);background:var(--cyan-l);padding:9px 13px;border-radius:11px;font-weight:600;margin-top:2px;border:1px solid #0c3d49}
.done-strip{color:var(--mint);background:var(--mint-l);border-color:#103f2e}
.refund-strip{color:var(--mint);background:var(--mint-l);border-color:#103f2e}
.cancel-banner{margin-top:4px;padding:11px 13px;border-radius:13px;background:var(--gold-l);border:1px solid #3a2a0e;animation:rise .25s}
.cancel-banner-t{display:flex;gap:7px;align-items:center;color:var(--gold);font-size:13px;font-weight:700}
.cancel-banner-t svg{flex:0 0 auto}
.cancel-banner-p{margin:6px 0 9px;font-size:12px;color:var(--ink2);line-height:1.45}
.claim-strip strong{font-weight:800}
.jc-actions{margin-top:4px;display:flex;justify-content:flex-end}

/* browse claim box */
.browse-card .effort{margin-left:auto}
.claim-box{background:#1A0C10;border:1px solid var(--line2);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px;margin-top:4px;animation:rise .3s}
.muted-inline{color:var(--muted);font-weight:500;font-size:12px}
.claim-actions{display:flex;gap:8px;justify-content:flex-end}

/* task card */
.task-card{gap:12px}
.sched{display:flex;align-items:center;gap:7px;font-size:13px;color:#ff8ea0;background:var(--primary-l);padding:9px 13px;border-radius:11px;font-weight:600;flex-wrap:wrap;border:1px solid var(--line2)}
.steps-head{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:13.5px;color:var(--ink2);margin-top:4px}
.steps-head>span:first-child{display:flex;align-items:center;gap:6px}
.steps-count{font-family:var(--mono);color:var(--mint);font-weight:700}
.steps{list-style:none;display:flex;flex-direction:column;gap:2px}
.step{display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:10px;transition:.16s}
.step:hover{background:#1A0C10}
.step-check{color:var(--line2);display:grid;place-items:center;transition:.16s;flex:none}
.step:hover .step-check{color:var(--primary)}
.step-done .step-check{color:var(--mint)}
.step-check:active{transform:scale(.8)}
.step-text{font-size:14px;font-weight:500;flex:1;transition:.2s}
.step-done .step-text{color:var(--muted);text-decoration:line-through}
.step-rm{opacity:0;color:var(--muted);width:24px;height:24px;border-radius:7px;display:grid;place-items:center;transition:.16s;flex:none}
.step:hover .step-rm{opacity:1}
.step-rm:hover{background:var(--accent-l);color:var(--accent)}
.add-step{display:flex;gap:8px}
.add-step .field-input{flex:1}
.task-actions{display:flex;gap:10px;margin-top:4px}
.task-actions .btn{flex:1}
.mini-done{gap:8px}

/* level / rewards */
.level-card{background:linear-gradient(135deg,#1B0E12 0%,#3A0D18 60%,#2A0E14 100%);color:#fff;border-radius:var(--r-lg);padding:24px;box-shadow:var(--sh),0 0 40px -16px var(--pglow);border:1px solid var(--line2);position:relative;overflow:hidden}
.level-card::after{content:"";position:absolute;top:-40%;right:-10%;width:260px;height:260px;background:radial-gradient(circle,rgba(255,194,75,.16),transparent 70%);pointer-events:none}
.lc-top{display:flex;gap:24px;align-items:center;flex-wrap:wrap;position:relative}
.lc-level,.lc-streak,.lc-earn{display:flex;align-items:baseline;gap:8px}
.lc-streak{align-items:center}
.lc-num{font-family:var(--mono);font-size:33px;font-weight:700;line-height:1;color:#fff;text-shadow:0 0 18px var(--pglow)}
.lc-top span:not(.lc-num){font-size:13px;opacity:.85;font-weight:600}
.flame{color:var(--ember);filter:drop-shadow(0 0 6px rgba(255,107,44,.6))}
.lc-bar{margin-top:18px;position:relative}
.lc-bar-label{display:flex;justify-content:space-between;font-size:12.5px;opacity:.9;font-weight:600;margin-bottom:7px}
.lc-bar .bar{background:rgba(0,0,0,.4)}
.rewards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.reward{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;text-align:center;position:relative;opacity:.5;filter:grayscale(.6);transition:.2s}
.reward-on{opacity:1;filter:none;border-color:var(--line2);box-shadow:var(--sh-sm),0 0 22px -10px var(--pglow)}
.reward-ic{width:48px;height:48px;border-radius:14px;background:#1A0C10;display:grid;place-items:center;margin:0 auto 10px;color:var(--muted)}
.reward-on .reward-ic{background:linear-gradient(135deg,var(--primary),var(--ember));color:#fff;box-shadow:0 0 20px -6px var(--pglow)}
.reward-t{font-weight:700;font-size:14.5px;font-family:var(--disp);color:#fff}
.reward-b{font-size:12px;color:var(--ink2);margin-top:3px}
.reward-badge{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--mint);color:#06231a;display:grid;place-items:center;box-shadow:0 0 14px -4px rgba(35,232,155,.7)}

/* worker level strip + energy */
.level-strip{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 16px;box-shadow:var(--sh-sm)}
.ls-lvl{font-family:var(--mono);font-weight:700;color:var(--primary);font-size:13px;background:var(--primary-l);padding:5px 11px;border-radius:999px;border:1px solid var(--line2)}
.ls-bar{flex:1}
.ls-r{display:flex;align-items:center;gap:5px;font-weight:700;font-family:var(--mono);color:var(--gold)}
.energy-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.energy-label{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13.5px;color:var(--ink2)}
.search-row{display:flex;gap:10px}
.search{flex:1;display:flex;align-items:center;gap:9px;background:#1A0C10;border:1.5px solid var(--line2);border-radius:13px;padding:0 14px;transition:.16s}
.search:focus-within{border-color:var(--primary);box-shadow:0 0 0 4px rgba(var(--p-rgb),.16)}
.search input{flex:1;border:none;background:none;padding:12px 0;font-size:14.5px;font-weight:500}
.search input:focus{outline:none}
.search svg{color:var(--muted)}

/* empty */
.empty{text-align:center;padding:54px 24px;background:var(--card);border:1.5px dashed var(--line2);border-radius:var(--r-lg)}
.empty-ic{width:62px;height:62px;border-radius:18px;background:#1A0C10;display:grid;place-items:center;margin:0 auto 14px;color:var(--primary);box-shadow:0 0 22px -10px var(--pglow)}
.empty h3{font-family:var(--disp);font-size:19px;font-weight:700;color:#fff}
.empty p{color:var(--ink2);font-size:14px;margin-top:5px;max-width:360px;margin-left:auto;margin-right:auto;line-height:1.5}

/* settings */
.set-card{display:flex;flex-direction:column;gap:6px}
.set-h{font-family:var(--disp);font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:6px;color:#fff}
.set-p,.set-card>.set-p{font-size:13.5px;color:var(--ink2);margin-bottom:10px;line-height:1.5}
.set-meta{font-size:12.5px;color:var(--muted);margin-top:10px}
.cap{font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.05em;color:var(--ink2);font-family:var(--disp)}
.stim-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.stim-toggle button{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:14px;border-radius:14px;border:1.5px solid var(--line2);background:#1A0C10;font-weight:700;font-size:14.5px;transition:.18s;text-align:left;color:var(--ink);font-family:var(--disp)}
.stim-toggle button svg{margin-bottom:2px}
.stim-toggle small{font-weight:500;font-size:12px;color:var(--muted);font-family:var(--font)}
.stim-toggle button.on{border-color:var(--primary);background:var(--primary-l);color:#ff8ea0;box-shadow:0 0 22px -10px var(--pglow)}
.stim-toggle button.on small{color:#d98a96}
.trow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-top:1px solid var(--line)}
.trow:first-of-type{border-top:none}
.trow-l{display:flex;align-items:center;gap:11px;color:var(--ink2)}
.trow-t{font-weight:700;font-size:14.5px;color:#fff}
.trow-h{font-size:12.5px;color:var(--muted);margin-top:1px}
.switch{width:50px;height:29px;border-radius:999px;background:#2c1016;position:relative;transition:.2s;flex:none;border:1px solid var(--line2)}
.switch-on{background:var(--primary);border-color:var(--primary);box-shadow:0 0 16px -4px var(--pglow)}
.knob{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.22s cubic-bezier(.2,1.3,.4,1);box-shadow:0 2px 6px rgba(0,0,0,.4)}
.switch-on .knob{left:25px}

/* focus overlay */
.overlay{position:fixed;inset:0;z-index:70;background:rgba(5,2,3,.72);backdrop-filter:blur(10px);display:grid;place-items:center;padding:20px;animation:fade .25s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.focus-card{background:linear-gradient(180deg,#1B0E12,#0E0709);border:1px solid var(--line2);border-radius:26px;padding:34px 30px;max-width:420px;width:100%;text-align:center;position:relative;box-shadow:0 40px 100px -30px rgba(0,0,0,.9),0 0 50px -16px var(--pglow);animation:pop .35s cubic-bezier(.2,1.3,.4,1)}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.focus-x{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:11px;display:grid;place-items:center;color:var(--muted)}
.focus-x:hover{background:#1A0C10;color:#fff}
.focus-eyebrow{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:#ff8ea0;background:var(--primary-l);padding:6px 13px;border-radius:999px;border:1px solid var(--line2);font-family:var(--disp)}
.focus-title{font-family:var(--disp);font-size:18px;font-weight:700;margin:14px 0 4px;line-height:1.3;color:#fff}
.ring-wrap{position:relative;width:232px;height:232px;margin:18px auto 6px}
.ring{transform:rotate(-90deg)}
.ring-track{fill:none;stroke:#2a1016;stroke-width:16}
.ring-prog{fill:none;stroke:var(--primary);stroke-width:16;stroke-linecap:round;transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 8px var(--pglow))}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-time{font-family:var(--mono);font-size:46px;font-weight:700;letter-spacing:-.02em;line-height:1;color:#fff}
.ring-sub{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:4px}
.focus-durs{display:flex;gap:8px;justify-content:center;margin:8px 0}
.dur{padding:8px 16px;border-radius:11px;border:1.5px solid var(--line2);font-weight:700;font-size:13.5px;color:var(--ink2);transition:.16s;font-family:var(--disp)}
.dur-on{border-color:var(--primary);background:var(--primary-l);color:#ff8ea0;box-shadow:0 0 18px -8px var(--pglow)}
.focus-line{font-size:14.5px;color:var(--ink2);margin:12px 0 18px;line-height:1.5;min-height:42px;font-weight:500}
.focus-actions{display:flex;gap:10px;justify-content:center}

/* ===== CALM MODE OVERRIDES ===== */
.stim-low *{animation:none!important;transition:background .15s,border-color .15s,color .15s,box-shadow .15s!important}
.stim-low .ring-prog{transition:stroke-dashoffset 1s linear!important}
.stim-low .bar-fill{transition:width .4s ease!important}
.stim-low .sparks,.stim-low .app::before{display:none}
.stim-low .btn-primary{background:var(--primary);box-shadow:none}
.stim-low .btn-primary::before{display:none}
.stim-low .btn-success{background:var(--mint);box-shadow:none}
.stim-low .brand-mark{background:var(--primary);box-shadow:none}
.stim-low .level-card{background:var(--card2);box-shadow:var(--sh-sm)}
.stim-low .cd-urgent{animation:none!important;text-shadow:none}
.stim-low .stat-ic,.stim-low .nav-ava{background:var(--primary)!important;box-shadow:none}
.stim-low .nav-tab.on,.stim-low .seg button.on,.stim-low .chip-on{box-shadow:none}
.stim-low .hero-h{text-shadow:none}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
  .sparks,.app::before{display:none}
}

/* ===== RESPONSIVE ===== */
@media (max-width:880px){
  .auth{grid-template-columns:1fr}
  .auth-pitch{padding:40px 26px 10px}
  .auth-panel{border-left:none;border-top:1px solid var(--line);box-shadow:none}
  .frows{display:none}
}

/* tablets + large phones */
@media (max-width:680px){
  .main{padding:20px 16px 88px}
  .page{gap:16px}
  .grid-2{grid-template-columns:1fr}
  .jobgrid{grid-template-columns:1fr}          /* never overflow on narrow screens */
  .card{padding:18px}
  .post-card{padding:18px}
  .level-card{padding:20px}
  .nav-inner{gap:10px;padding:10px 14px}
  .nav-tabs{margin-left:4px;gap:2px;padding:4px}
  .nav-tab span{display:none}                  /* icon-only tabs */
  .nav-tab{padding:9px 11px}
  .brand span:last-child{display:none}         /* hide wordmark, keep the flame */
  .nav-ava,.iconbtn{width:36px;height:36px}
  .hero-h{font-size:34px}
  .lc-top{gap:16px}
  .lc-num{font-size:27px}
  .payout-big{font-size:27px}
  .task-actions{flex-direction:column}
  /* compact 3-up stat tiles instead of one giant column */
  .stat-row{grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{flex-direction:column;align-items:center;text-align:center;gap:7px;padding:13px 8px}
  .stat-ic{width:36px;height:36px}
  .stat-val{font-size:20px}
  .stat-lab{font-size:11px;margin-top:1px}
}

/* phones */
@media (max-width:460px){
  .main{padding:18px 13px 88px}
  .page-head h1{font-size:24px}
  .page-head p{font-size:14px}
  .card,.post-card{padding:16px}
  .rewards-grid{grid-template-columns:1fr 1fr;gap:10px} /* 2-up badges */
  .reward{padding:14px}
  .reward-ic{width:42px;height:42px}
  .energy-row{gap:6px}
  .loc-bar-row{flex-wrap:wrap}
  .loc-bar-input{min-width:0;flex:1 1 130px}
  .nav-tab{padding:9px 10px}
  /* focus timer scales down so the ring never spills off-screen */
  .focus-card{padding:24px 18px}
  .ring-wrap{width:min(232px,62vw);height:auto;aspect-ratio:1;margin:16px auto 6px}
  .ring{width:100%;height:auto;display:block}
  .ring-time{font-size:40px}
  .focus-durs{flex-wrap:wrap}
}
`;


/* ---------- mount ---------- */
const __rootEl = document.getElementById("root");
const __root = ReactDOM.createRoot(__rootEl);
__root.render(React.createElement(App));

</script>
</body>
