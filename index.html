/* ---------- friendly auth error text ---------- */
function friendly(error) {
  const m = (error && error.message ? error.message : "").toLowerCase();
  if (m.includes("invalid login")) return "That email or password doesn't match.";
  if (m.includes("already registered") || m.includes("already been registered"))
    return "An account already uses that email. Try logging in.";
  if (m.includes("password should") || m.includes("at least 6"))
    return "Password needs at least 6 characters.";
  if (m.includes("unable to validate email") || m.includes("invalid email"))
    return "Enter a valid email address.";
  if (m.includes("rate limit")) return "Too many attempts — wait a moment and try again.";
  return (error && error.message) || "Something went wrong. Try again.";
}

  return { profile: error || !data ? null : rowToProfile(data), error };

async function dbEnsureProfile(authUser, meta = {}) {
  const found = await dbFetchProfile(authUser.id);
  if (found.profile) return found;
  const md = authUser.user_metadata || {};
  const name = meta.name || md.name || authUser.email.split("@")[0];
  const type = meta.type || md.type || "worker";
  const row = {
    id: authUser.id, email: authUser.email, name, type,
    settings: defaultSettings(type, name),
    xp: 0, level: 1, streak: 0, last_done: null, completed_count: 0, total_earned: 0,
  };
  const { data, error } = await supabase
    .from("profiles").upsert(row, { onConflict: "id" }).select().maybeSingle();
  if (error || !data) { console.error("ensureProfile", error); return await dbFetchProfile(authUser.id); }
  return { profile: rowToProfile(data), error: null };
}

/* ---------- location helpers ---------- */
// Free geocoding via OpenStreetMap Nominatim. Fine for low volume; for heavy
// use, swap in a paid geocoder or move this into an edge function.
function pickCity(a) {
  if (!a) return "";
  return (a.city || a.town || a.village || a.municipality || a.hamlet || a.suburb || a.county || "").trim();
}
async function geocodeAddress(q) {
  if (!q || !q.trim()) return null;
  try {
    const res = await fetch(
      "https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&q=" +
        encodeURIComponent(q.trim()),
      { headers: { Accept: "application/json" } }
    );
    const arr = await res.json();
    if (arr && arr[0]) return { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon), label: arr[0].display_name, city: pickCity(arr[0].address) };
  } catch (e) { console.error("geocode", e); }
  return null;
}
async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(
      "https://nominatim.openstreetmap.org/reverse?format=json&zoom=14&addressdetails=1&lat=" + lat + "&lon=" + lng,
      { headers: { Accept: "application/json" } }
    );
    const j = await res.json();
    if (j && j.display_name) return { label: j.display_name, city: pickCity(j.address) };
  } catch (e) {}
  return null;
}
function getCurrentPosition() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
      () => resolve(null),
      { enableHighAccuracy: false, timeout: 9000, maximumAge: 60000 }
    );
  });
}
function milesBetween(a, b) {
  if (!a || !b || a.lat == null || b.lat == null) return null;
  const R = 3958.8, toRad = (d) => (d * Math.PI) / 180;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
function fmtMiles(mi) {
  if (mi == null) return "";
  if (mi < 0.1) return "here";
  if (mi < 10) return mi.toFixed(1) + " mi";
  return Math.round(mi) + " mi";
}

/* ---------- theme (accent color → dark palette) ---------- */
function hexToHue(hex) {
  let h = String(hex || "").replace("#", "");
  if (h.length === 3) h = h.split("").map(c => c + c).join("");
  const r = parseInt(h.slice(0, 2), 16) / 255, g = parseInt(h.slice(2, 4), 16) / 255, b = parseInt(h.slice(4, 6), 16) / 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
  let hue = 0;
  if (d !== 0) {
    if (mx === r) hue = ((g - b) / d) % 6;
    else if (mx === g) hue = (b - r) / d + 2;
    else hue = (r - g) / d + 4;
    hue = hue * 60; if (hue < 0) hue += 360;
  }
  return { hue, sat: mx === 0 ? 0 : d / mx };
}
// Pass a hex to theme the app; pass null/empty to restore the default crimson.
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return Math.round(255 * f(0)) + "," + Math.round(255 * f(8)) + "," + Math.round(255 * f(4));
}
function applyTheme(hex) {
  const root = document.documentElement.style;
  const keys = ["--p-rgb","--a-rgb","--primary-d","--primary-l","--accent-l","--ember",
    "--bg","--bg2","--void","--card","--card2","--line","--line2","--ink","--ink2","--muted"];
  if (!hex) { keys.forEach(k => root.removeProperty(k)); return; }
  const { hue, sat } = hexToHue(hex);
  const H = sat < 0.08 ? 222 : Math.round(hue);     // gray/white/black input → tasteful blue
  const H2 = (H + 14) % 360;
  const hsl = (s, l) => `hsl(${H}, ${s}%, ${l}%)`;
  // primary + accent flow through RGB triplets so every glow/tint follows along;
  // the rest are fixed shades of the same hue, kept dark + black-based.
  const set = {
    "--p-rgb": hslToRgb(H, 80, 52), "--a-rgb": hslToRgb(H, 100, 66),
    "--primary-d": hsl(82, 40), "--primary-l": hsl(48, 10),
    "--accent-l": hsl(45, 12), "--ember": `hsl(${H2}, 95%, 60%)`,
    "--bg": hsl(32, 4.5), "--bg2": hsl(36, 7.5), "--void": hsl(30, 2.5),
    "--card": hsl(30, 6), "--card2": hsl(30, 9.5), "--line": hsl(34, 14), "--line2": hsl(38, 19),
    "--ink": hsl(30, 95), "--ink2": hsl(26, 72), "--muted": hsl(22, 47),
  };
  Object.keys(set).forEach(k => root.setProperty(k, set[k]));
}

/* ---------- edge-function caller (Stripe logic lives server-side) ---------- */
async function callFn(name, body) {
  const { data } = await supabase.auth.getSession();
  const token = data && data.session ? data.session.access_token : null;
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + (token || SUPABASE_ANON_KEY),
      apikey: SUPABASE_ANON_KEY,
    },
    body: JSON.stringify(body || {}),
  });
  let json = null;
  try { json = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error((json && (json.error || json.message)) || "Request failed (" + res.status + ")");
  return json || {};
}

/* ---------- device notifications (opt-in) ---------- */
// Shows a system notification via the service worker (falls back to the
// Notifications API). By default it only fires when the tab isn't focused, so
// it never doubles up with the in-app toast; pass {force:true} for a test.
function deviceNotify(title, body, opts) {
  try {
    if (!("Notification" in window) || Notification.permission !== "granted") return;
    if (!(opts && opts.force) && typeof document !== "undefined" && !document.hidden) return;
    const o = { body: body || "", tag: opts && opts.tag, renotify: false, data: { url: location.href } };
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready
        .then(reg => reg.showNotification(title, o))
        .catch(() => { try { new Notification(title, o); } catch (e) {} });
    } else {
      new Notification(title, o);
    }
  } catch (e) {}
}

/* ---------- real Web Push (closed-app notifications) ---------- */
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
// Subscribe this device to push and save the subscription for the server to use.
async function subscribeToPush() {
  try {
    if (!PUSH_PUBLIC_KEY || !("serviceWorker" in navigator) || !("PushManager" in window)) return false;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(PUSH_PUBLIC_KEY),
      });
    }
    const json = sub.toJSON();
    const { data } = await supabase.auth.getUser();
    const uid = data && data.user && data.user.id;
    if (uid) {
      await supabase.from("push_subscriptions").upsert(
        { user_id: uid, endpoint: json.endpoint, subscription: json },
        { onConflict: "endpoint" }
      );
    }
    return true;
  } catch (e) { console.error("push subscribe failed", e); return false; }
}
// Ask the server to push a notification to another user's devices.
async function sendPush(toUserId, title, body) {
  if (!toUserId || !PUSH_PUBLIC_KEY) return;
  try { await callFn("send-push", { to: toUserId, title, body }); } catch (e) { /* best-effort */ }
}

async function sendTestPush() {
  try {
    if (!PUSH_PUBLIC_KEY) return { ok: false, error: "Push isn't configured (no key)." };
    await subscribeToPush();
    const { data } = await supabase.auth.getUser();
    const uid = data && data.user && data.user.id;
    if (!uid) return { ok: false, error: "You're not signed in." };
    const res = await callFn("send-push", {

  } catch (e) {
    return { ok: false, error: (e && e.message) ? e.message : String(e) };
  }
}

/* ---------- synthesized sound (Web Audio) ---------- */
let AC = null;
function ctx() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === "suspended") AC.resume();
  return AC;
}
function blip(freq, start, dur, type, gain) {
  const c = ctx(); if (!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(c.destination);
  const t = c.currentTime + start;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(Math.max(gain, 0.0002), t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}
const AUDIO = { on: true, vol: 1 };
const SOUNDS = {
  click:   v => blip(320, 0, 0.05, "triangle", 0.07 * v),
  pop:     v => { blip(680, 0, 0.06, "sine", 0.13 * v); blip(1020, 0.03, 0.06, "sine", 0.08 * v); },
  claim:   v => { blip(523, 0, 0.10, "sine", 0.13 * v); blip(784, 0.09, 0.14, "sine", 0.12 * v); },
  success: v => [523, 659, 784, 1046].forEach((f, i) => blip(f, i * 0.08, 0.18, "sine", 0.13 * v)),
  levelup: v => [523, 659, 784, 1046, 1318, 1568].forEach((f, i) => blip(f, i * 0.07, 0.22, "triangle", 0.12 * v)),
  error:   v => { blip(196, 0, 0.16, "sawtooth", 0.08 * v); blip(146, 0.06, 0.18, "sawtooth", 0.06 * v); },
  tick:    v => blip(900, 0, 0.025, "sine", 0.05 * v),
  toggle:  v => blip(440, 0, 0.05, "square", 0.05 * v),
};
function play(name) {
  if (!AUDIO.on) return;
  const f = SOUNDS[name];
  if (f) try { f(AUDIO.vol); } catch (e) {}
}

function fmtRemaining(ms) {

function ConfettiLayer({ trigger }) {

  useEffect(() => {
    if (!trigger) return;
    const cs = getComputedStyle(document.documentElement);
    const v = (name, fallback) => { const x = cs.getPropertyValue(name).trim(); return x || fallback; };
    const colors = [v("--primary", "#E6173A"), v("--accent", "#FF4D6D"), "#FFC24B", "#23E89B", v("--ember", "#FF6B2C")];
    const batch = Array.from({ length: 90 }, (_, i) => ({
      id: trigger + "-" + i + "-" + Math.random(),
      left: Math.random() * 100, bg: colors[i % colors.length],
      delay: Math.random() * 0.25, dur: 1.3 + Math.random() * 1.2,
      w: 6 + Math.random() * 8, h: 6 + Math.random() * 6,
      drift: (Math.random() - 0.5) * 260, rot: Math.random() * 720,
    }));
    setPieces(p => [...p, ...batch]);
    const t = setTimeout(() => setPieces(p => p.filter(x => !batch.some(b => b.id === x.id))), 2800);
    return () => clearTimeout(t);
  }, [trigger]);
  return (
    <div className="confetti-layer" aria-hidden="true">
      {pieces.map(p => (
        <span key={p.id} className="confetti-piece"
          style={{ left: p.left + "%", background: p.bg, width: p.w, height: p.h,

      ))}

  );

   ============================================================ */
function FocusOverlay({ job, onClose }) {
  const [mins, setMins] = useState(15);
  const [elapsed, setElapsed] = useState(0);
  const [running, setRunning] = useState(false);
  const [line, setLine] = useState(FOCUS_LINES[0]);
  const total = mins * 60;
  const left = Math.max(0, total - elapsed);
  const progress = total ? elapsed / total : 0;
  const R = 96, C = 2 * Math.PI * R;

  useEffect(() => {
    if (!running) return;
    const t = setInterval(() => setElapsed(e => {
      const n = e + 1;
      if (n % 30 === 0) play("tick");
      if (n >= total) {
        clearInterval(t); setRunning(false); play("success");
        return total;
      }
      return n;
    }), 1000);
    return () => clearInterval(t);
  }, [running, total]);

  useEffect(() => {
    const t = setInterval(() => setLine(FOCUS_LINES[Math.floor(Math.random() * FOCUS_LINES.length)]), 9000);
    return () => clearInterval(t);
  }, []);

  const done = left === 0 && elapsed > 0;
  const mm = String(Math.floor(left / 60)).padStart(2, "0");
  const ss = String(left % 60).padStart(2, "0");

  return (
    <div className="overlay" onClick={onClose}>
      <div className="focus-card" onClick={e => e.stopPropagation()}>
        <button className="focus-x" onClick={() => { play("click"); onClose(); }} aria-label="Close focus sprint"><X size={20} /></button>
        <div className="focus-eyebrow"><Wind size={14} /> Focus sprint</div>
        <h3 className="focus-title">{job.title}</h3>

        <div className="ring-wrap">
          <svg width="232" height="232" viewBox="0 0 232 232" className="ring">
            <circle cx="116" cy="116" r={R} className="ring-track" />
            <circle cx="116" cy="116" r={R} className="ring-prog"
              style={{ strokeDasharray: C, strokeDashoffset: C * (1 - progress) }} />
          </svg>
          <div className="ring-center">
            <div className="ring-time">{done ? "Done!" : `${mm}:${ss}`}</div>
            <div className="ring-sub">{done ? "Sprint complete" : running ? "stay with it" : "ready when you are"}</div>
          </div>
        </div>

        {!running && !done && (
          <div className="focus-durs">
            {[5, 15, 25].map(m => (
              <button key={m} className={`dur ${mins === m ? "dur-on" : ""}`}
                onClick={() => { play("toggle"); setMins(m); setElapsed(0); }}>{m} min</button>
            ))}
          </div>
        )}

        <p className="focus-line">{done ? "Take a breath. You earned it." : line}</p>

        <div className="focus-actions">
          {!done && (
            <Btn variant={running ? "ghost" : "primary"} size="lg" icon={running ? Pause : Play}
              onClick={() => setRunning(r => !r)} sound="toggle">
              {running ? "Pause" : elapsed > 0 ? "Resume" : "Start sprint"}
            </Btn>
          )}
          {(elapsed > 0) && (
            <Btn variant="ghost" size="lg" icon={RefreshCw} onClick={() => { setElapsed(0); setRunning(false); }}>Reset</Btn>
          )}
          {done && <Btn variant="success" size="lg" icon={Check} onClick={() => { play("click"); onClose(); }}>Back to task</Btn>}
        </div>
      </div>
    </div>
  );
}

function PostQuestForm() {
  const { user, postJob, toast, platform, jobs } = useApp();
  const [title, setTitle] = useState("");
  const [cat, setCat] = useState("Cleanup");
  const [desc, setDesc] = useState("");
  const [loc, setLoc] = useState("");
  const [coords, setCoords] = useState(null);
  const [locBusy, setLocBusy] = useState(false);
  const [effort, setEffort] = useState("Medium");
  const [est, setEst] = useState("");
  const [payout, setPayout] = useState(user.settings?.defaultPayout || 60);
  const [deadline, setDeadline] = useState(toLocalInput(Date.now() + 2 * DAY));
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const totalCharge = Math.max(0, Math.round(Number(payout || 0) * (1 + PLATFORM_FEE_PCT / 100)));

  async function useMyLocation() {
    setLocBusy(true);
    const p = await getCurrentPosition();
    if (!p) { setLocBusy(false); toast("Couldn't get your location — type an address instead.", "info"); return; }
    setCoords({ lat: p.lat, lng: p.lng });
    const r = await reverseGeocode(p.lat, p.lng);
    setLoc((r && r.label) || `${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}`);
    setLocBusy(false);
  }

  async function submit() {
    if (busy) return;
    setErr("");
    if (!title.trim()) { play("error"); return setErr("Give the quest a clear title."); }
    if (Number(payout) <= 0) { play("error"); return setErr("Set a payout above $0."); }
    if (!platform.postingEnabled) { play("error"); return setErr("New quests are paused right now — check back soon."); }
    const pay = Number(payout);
    if (pay < platform.minPayout) { play("error"); return setErr(`Minimum payout is ${money(platform.minPayout)}.`); }
    if (platform.maxPayout > 0 && pay > platform.maxPayout) { play("error"); return setErr(`Maximum payout is ${money(platform.maxPayout)}.`); }
    if (platform.maxActiveJobs > 0) {
      const activeMine = jobs.filter(j => j.postedBy === user.id && ["open", "claimed", "submitted", "pending_payment"].includes(j.status)).length;
      if (activeMine >= platform.maxActiveJobs) { play("error"); return setErr(`You can have at most ${platform.maxActiveJobs} active quests at once. Finish or cancel one first.`); }
    }
    const dl = new Date(deadline).getTime();
    if (!dl || dl < Date.now()) { play("error"); return setErr("Pick a deadline in the future."); }

    // Resolve coordinates from the typed address if we don't have them yet.
    let lat = coords ? coords.lat : null, lng = coords ? coords.lng : null;
    const locText = loc.trim();
    if (locText && lat == null && !/^remote/i.test(locText)) {
      setLocBusy(true);
      const g = await geocodeAddress(locText);
      setLocBusy(false);
      if (g) { lat = g.lat; lng = g.lng; setCoords({ lat, lng }); }
    }

    setBusy(true);
    const ok = await postJob({
      title: title.trim(), category: cat, desc: desc.trim(), location: locText,
      effort, estTime: est.trim() || "Flexible", payout: Number(payout), deadline: dl,
      lat, lng,
    });
    setBusy(false);
    // In payments mode postJob redirects to Stripe (returns falsey) — don't clear here.
    if (!ok) return;
    setTitle(""); setDesc(""); setLoc(""); setEst(""); setCoords(null);
    toast("Quest posted — it's live on the board.", "success");
  }

  return (
    <div className="card post-card">
      <div className="card-head"><Plus size={18} strokeWidth={2.6} /><h2>Post a quest</h2></div>
      <p className="card-sub">Keep it small and clear — one clean task with a hard deadline.</p>

      <Field label="Title" placeholder="e.g. Jobsite cleanup — sweep & haul debris" value={title} onChange={e => setTitle(e.target.value)} />

      <div className="field-label" style={{ marginTop: 4 }}>Category</div>
      <div className="chips">
        {CATEGORIES.map(c => <Chip key={c} active={cat === c} onClick={() => setCat(c)}>{c}</Chip>)}
      </div>

      <label className="field">
        <span className="field-label">What needs doing</span>
        <textarea className="field-input field-area" rows={3} placeholder="A sentence or two. The clearer the steps, the faster it gets claimed."
          value={desc} onChange={e => setDesc(e.target.value)} />
      </label>

      <div className="grid-2">
        <div className="field">
          <span className="field-label">Location</span>
          <div className="loc-input">
            <input className="field-input" placeholder="Address or 'Remote'" value={loc}
              onChange={e => { setLoc(e.target.value); setCoords(null); }} />
            <button type="button" className="loc-btn" onClick={useMyLocation} disabled={locBusy}
              title="Use my current location" aria-label="Use my current location">
              <MapPin size={15} strokeWidth={2.4} />
            </button>
          </div>
          {coords && <span className="field-hint">📍 Pinned — workers nearby will see this quest</span>}
        </div>
        <Field label="Rough time estimate" placeholder="e.g. 2–3 hrs" value={est} onChange={e => setEst(e.target.value)} />
      </div>

      <div className="field-label" style={{ marginTop: 4 }}>Effort level</div>
      <div className="chips">
        {EFFORTS.map(e => <Chip key={e} active={effort === e} onClick={() => setEffort(e)} tone={e === "Light" ? "mint" : e === "Heavy" ? "coral" : ""}>{e}</Chip>)}
      </div>

      <div className="grid-2">
        <label className="field">
          <span className="field-label">Payout (flat)</span>
          <div className="money-wrap">
            <span className="money-sign">$</span>
            <input className="field-input field-money" type="number" min="1" value={payout} onChange={e => setPayout(e.target.value)} />
          </div>
        </label>
        <Field label="Done by (deadline)" type="datetime-local" value={deadline} min={toLocalInput(Date.now())} onChange={e => setDeadline(e.target.value)} />
      </div>

      {PAYMENTS_ENABLED && <RefundNote />}

      {err && <div className="auth-err"><X size={14} strokeWidth={3} />{err}</div>}
      <Btn full size="lg" icon={Rocket} onClick={submit} disabled={busy || locBusy} sound="claim">
        {busy ? "Starting checkout…" : PAYMENTS_ENABLED ? `Pay ${money(totalCharge)} & post quest` : "Post quest to the board"}
      </Btn>
      {PAYMENTS_ENABLED && <p className="pay-note">Secure Stripe checkout — you're charged when you post, and the quest goes live the moment payment clears. Your quester earns this full payout for completing it. If it isn't completed by the deadline, you're refunded in full automatically.</p>}
    </div>
  );
}

      <div className="add-step">
        <input className="field-input" placeholder="Add a tiny step…" value={newStep}
          onChange={e => setNewStep(e.target.value)} onKeyDown={e => e.key === "Enter" && addStep()} />

      </div>

      <div className="proof-up">
        <div className="steps-head"><span><Eye size={15} /> Proof photos</span><span className="muted-inline">required to submit</span></div>
        <div className="proof-grid">
          {photos.map(p => (

      <div className="task-actions">
        <Btn variant="ghost" icon={Wind} onClick={() => { play("pop"); setFocusJob(job); }}>Focus sprint</Btn>
        <Btn variant="success" icon={CheckCircle2} onClick={submitForReview} disabled={photos.length === 0 || upBusy} sound="success">Submit for review</Btn>
      </div>

      <JobChat job={job} />

      <div className="giveup">
        {!giveUp ? (
          <button className="giveup-link" onClick={() => setGiveUp(true)}>Can't finish this quest?</button>
        ) : (
          <div className="giveup-box">
            <div className="giveup-h"><Heart size={14} /> Life happens — no penalty. This puts the quest back for someone else.</div>
            <label className="field-label">Reason</label>
            <select className="field-input" value={reason} onChange={e => setReason(e.target.value)}>
              {["Something came up", "Emergency", "Ran out of time", "Too hard for me", "Other"].map(r => <option key={r} value={r}>{r}</option>)}
            </select>
            <label className="field-label">What got done so far? <span className="muted-inline">(optional — helps the client & next person)</span></label>
            <textarea className="field-input giveup-note" rows="3" placeholder="e.g. Cleared the garage but didn't get to the shed…"
              value={note} onChange={e => setNote(e.target.value)} />
            <div className="giveup-actions">
              <Btn variant="ghost" size="sm" onClick={() => setGiveUp(false)} sound="toggle">Never mind</Btn>
              <Btn variant="ghostdanger" size="sm" icon={ArrowRight} onClick={() => releaseJob(job.id, { reason, note })} sound="toggle">Release quest</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ProofGallery({ paths }) {
  const [urls, setUrls] = useState([]);
  useEffect(() => {
    let active = true;
    (async () => {
      const out = [];
      for (const p of (paths || [])) { const u = await signedProofUrl(p); if (u) out.push({ path: p, url: u }); }
      if (active) setUrls(out);
    })();
    return () => { active = false; };
  }, [JSON.stringify(paths || [])]);
  if (!paths || paths.length === 0) return null;
  return (
    <div className="proof-grid">
      {urls.map(u => (
        <a key={u.path} href={u.url} target="_blank" rel="noopener noreferrer" className="proof-thumb" title="Open full size">
          <img src={u.url} alt="proof of work" loading="lazy" />
        </a>
      ))}
      {urls.length < paths.length && <div className="proof-thumb loadingthumb"><span className="spin"><RefreshCw size={16} /></span></div>}
    </div>
  );
}
function JobChat({ job }) {
  const { user, toast } = useApp();
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([]);
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  const other = user.type === "client" ? (job.claimedByName || "your quester") : (job.postedByName || "the client");

  useEffect(() => {
    if (!open) return;
    let active = true;
    setLoading(true);
    (async () => {
      const { data } = await supabase.from("messages").select("*").eq("job_id", job.id).order("created_at", { ascending: true });
      if (active) { setMsgs((data || []).map(rowToMsg)); setLoading(false); }
    })();
    const ch = supabase.channel("chat-" + job.id)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: "job_id=eq." + job.id },
        payload => { const m = rowToMsg(payload.new); setMsgs(prev => prev.some(x => x.id === m.id) ? prev : [...prev, m]); })
      .subscribe();
    return () => { active = false; try { supabase.removeChannel(ch); } catch (e) {} };
  }, [open, job.id]);

  useEffect(() => { if (open && endRef.current) endRef.current.scrollIntoView({ behavior: "smooth", block: "end" }); }, [msgs, open]);

  async function send() {
    const body = text.trim();
    if (!body) return;
    setText("");
    const row = { job_id: job.id, sender_id: user.id, sender_name: user.name, body, created_at: Date.now() };
    const { data, error } = await supabase.from("messages").insert(row).select().single();
    if (error) { toast("Message didn't send — try again.", "error"); setText(body); return; }
    if (data) { const m = rowToMsg(data); setMsgs(prev => prev.some(x => x.id === m.id) ? prev : [...prev, m]); }
    play("click");
    const otherId = user.id === job.postedBy ? job.claimedBy : job.postedBy;
    sendPush(otherId, `Message from ${user.name}`, body.length > 80 ? body.slice(0, 80) + "…" : body);
  }

  return (
    <div className="chat">
      <button className={`chat-toggle ${open ? "open" : ""}`} onClick={() => { setOpen(o => !o); play("toggle"); }}>
        <MessageCircle size={15} strokeWidth={2.4} /> Message {other}
        <ChevronRight size={15} className="chat-chev" />
      </button>
      {open && (
        <div className="chat-body">
          <div className="chat-msgs">
            {loading && <div className="chat-empty">Loading…</div>}
            {!loading && msgs.length === 0 && <div className="chat-empty">No messages yet — say hi 👋</div>}
            {msgs.map(m => (
              <div key={m.id} className={`bubble ${m.senderId === user.id ? "mine" : ""}`}>
                {m.senderId !== user.id && <span className="bubble-name">{m.senderName}</span>}
                <span className="bubble-text">{m.body}</span>
              </div>
            ))}
            <div ref={endRef} />
          </div>
          <div className="chat-input">
            <input value={text} onChange={e => setText(e.target.value)}
              onKeyDown={e => e.key === "Enter" && send()} placeholder={`Message ${other}…`} maxLength={1000} />
            <button className="chat-send" onClick={send} aria-label="Send message"><Send size={16} strokeWidth={2.4} /></button>
          </div>
        </div>
      )}
    </div>
  );
}
function WorkerHome() {
  const { user, jobs, view, setEnergy, refreshJobs, saveSettings, setHomeLocation, toast, platform } = useApp();
  const [cat, setCat] = useState("All");
  const [q, setQ] = useState("");
  const [addr, setAddr] = useState(user.settings?.locLabel || "");
  const [locBusy, setLocBusy] = useState(false);

  const myLoc = user.homeLat != null ? { lat: user.homeLat, lng: user.homeLng } : null;
  const radius = user.settings?.radius || 25;
  const useDist = !!user.settings?.filterByDistance;

  async function applyAddress() {
    if (!addr.trim()) return;
    setLocBusy(true);
    const g = await geocodeAddress(addr);
    setLocBusy(false);
    if (!g) { toast("Couldn't find that address — try being more specific.", "info"); return; }
    setHomeLocation(g.lat, g.lng, g.city);
    saveSettings({ locLabel: addr.trim() });
    toast("Location set — sorting by distance.", "success");
  }
  async function useMyLocation() {
    setLocBusy(true);
    const p = await getCurrentPosition();
    if (!p) { setLocBusy(false); toast("Couldn't get your location — type an address instead.", "info"); return; }
    const r = await reverseGeocode(p.lat, p.lng);
    setHomeLocation(p.lat, p.lng, r && r.city);
    const shown = (r && r.label) || `${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}`;
    setLocBusy(false);
    setAddr(shown);
    saveSettings({ locLabel: shown });
    toast("Location set — sorting by distance.", "success");
  }

  const open = jobs.filter(j => j.status === "open" && j.deadline > Date.now());
  const decorated = open.map(j => ({
    job: j,
    mi: (myLoc && j.lat != null) ? milesBetween(myLoc, { lat: j.lat, lng: j.lng }) : null,
  }));
  const filtered = decorated.filter(({ job: j, mi }) =>
    (cat === "All" || j.category === cat) &&
    (!q || (j.title + j.desc + j.location).toLowerCase().includes(q.toLowerCase())) &&
    (!useDist || !myLoc || mi == null || mi <= radius)
  ).sort((a, b) => {
    if (useDist && myLoc) {
      const am = a.mi == null ? Infinity : a.mi, bm = b.mi == null ? Infinity : b.mi;
      if (am !== bm) return am - bm;
    }
    return a.job.deadline - b.job.deadline;
  });

  // A quest that was claimed and then dropped comes back to the board needing
  // urgent coverage. Surface those first in their own section, soonest due first.
  const isUrgent = j => j.status === "open" && (j.releaseReason || j.releaseNote);
  const urgentList = filtered.filter(({ job: j }) => isUrgent(j))
    .sort((a, b) => a.job.deadline - b.job.deadline);
  const regularList = filtered.filter(({ job: j }) => !isUrgent(j));

  const myTasks = jobs.filter(j => j.claimedBy === user.id).sort((a, b) => (a.scheduledTime || 0) - (b.scheduledTime || 0));
  const active = myTasks.filter(j => j.status === "claimed" || j.status === "submitted");
  const finished = myTasks.filter(j => j.status === "completed");

  const xp = user.xp || 0, lvl = levelFor(xp), into = xp % 250, pct = (into / 250) * 100;

  if (view === "rewards") {
    const rewards = [
      { icon: Star, title: "First quest", body: "Complete your first task", earned: (user.completedCount || 0) >= 1 },
      { icon: Flame, title: "On a roll", body: "Hit a 3-day streak", earned: (user.streak || 0) >= 3 },
      { icon: Trophy, title: "High five", body: "Finish 5 quests", earned: (user.completedCount || 0) >= 5 },
      { icon: TrendingUp, title: "Level 3", body: "Reach level 3", earned: lvl >= 3 },
      { icon: DollarSign, title: "First $250", body: "Earn $250 total", earned: (user.totalEarned || 0) >= 250 },
      { icon: Award, title: "Big earner", body: "Earn $1,000 total", earned: (user.totalEarned || 0) >= 1000 },
    ];
    return (
      <div className="page">
        <header className="page-head"><h1>Your rewards</h1><p>Every finished quest builds your streak and your level.</p></header>
        <div className="level-card">
          <div className="lc-top">
            <div className="lc-level"><span className="lc-num">{lvl}</span><span>Level</span></div>
            <div className="lc-streak"><Flame size={22} className="flame" /><span className="lc-num">{user.streak || 0}</span><span>day streak</span></div>
            <div className="lc-earn"><span className="lc-num">{money(user.totalEarned || 0)}</span><span>earned</span></div>
          </div>
          <div className="lc-bar">
            <div className="lc-bar-label"><span>{into} XP</span><span>{250 - into} to level {lvl + 1}</span></div>
            <Bar value={pct} tone="primary" height={12} />
          </div>
        </div>
        <div className="rewards-grid">{rewards.map((r, i) => <RewardCard key={i} {...r} />)}</div>
        <CityScoreboard />
        <PayoutHint />
      </div>
    );
  }

  if (view === "tasks") {
    return (
      <div className="page">
        <header className="page-head"><h1>Your tasks</h1><p>{active.length ? "Break them down, sprint through, check them off." : "Nothing claimed yet."}</p></header>
        <PayoutHint />
        {active.length === 0 && finished.length === 0
          ? <Empty icon={Target} title="No quests claimed" body="Browse the board and grab one that fits your energy today." />
          : <>
            {active.length > 0 && <div className="jobgrid">{active.map(j => <TaskCard key={j.id} job={j} />)}</div>}
            {finished.length > 0 && <>
              <h2 className="sub-h"><Trophy size={18} /> Completed</h2>
              <div className="jobgrid">{finished.map(j => (
                <div key={j.id} className="card jobcard jobcard-completed mini-done">
                  <div className="jc-top"><span className="cat-tag">{j.category}</span><StatusBadge status="completed" /></div>
                  <h3 className="jc-title">{j.title}</h3>
                  <div className="payout">{money(questerNet(j.payout, platform.commissionPct))} earned</div>
                </div>
              ))}</div>
            </>}
          </>}
      </div>
    );
  }

  // browse
  return (
    <div className="page">
      <header className="page-head">
        <div className="head-flex">
          <div><h1>Find your quest</h1><p>Flat pay, your schedule. Grab what fits today.</p></div>
          <IconBtn icon={RefreshCw} label="Refresh board" onClick={refreshJobs} />
        </div>
      </header>

      <div className="level-strip">
        <div className="ls-l"><span className="ls-lvl">Lv {lvl}</span></div>
        <div className="ls-bar"><Bar value={pct} tone="primary" /></div>
        <div className="ls-r"><Flame size={16} className="flame" />{user.streak || 0}</div>
      </div>

      <PayoutHint />

      <div className="energy-row">
        <span className="energy-label"><Gauge size={15} /> Energy today</span>
        {ENERGIES.map(e => <Chip key={e} active={(user.settings?.energy) === e} onClick={() => setEnergy(e)}>{e}</Chip>)}
      </div>

      <div className="loc-bar">
        <div className="loc-bar-row">
          <MapPin size={15} strokeWidth={2.4} />
          <input className="loc-bar-input" placeholder="Your address or area" value={addr}
            onChange={e => setAddr(e.target.value)} onKeyDown={e => e.key === "Enter" && applyAddress()} />
          <button className="loc-mini" onClick={applyAddress} disabled={locBusy}>{locBusy ? "…" : "Set"}</button>
          <button className="loc-mini ghost" onClick={useMyLocation} disabled={locBusy} title="Use current location">
            <Target size={14} strokeWidth={2.6} />
          </button>
        </div>
        {myLoc && (
          <div className="radius-row">
            <label className="rad-check">
              <input type="checkbox" checked={useDist} onChange={e => saveSettings({ filterByDistance: e.target.checked })} />
              <span>Within</span>
            </label>
            <input className="rad-range" type="range" min="1" max="100" value={radius}
              onChange={e => saveSettings({ radius: Number(e.target.value) })} />
            <span className="rad-val">{radius} mi</span>
          </div>
        )}
      </div>

      <div className="search-row">
        <div className="search"><Search size={16} /><input placeholder="Search quests…" value={q} onChange={e => setQ(e.target.value)} /></div>
      </div>
      <div className="chips chips-scroll">
        <Chip active={cat === "All"} onClick={() => setCat("All")}>All</Chip>
        {CATEGORIES.map(c => <Chip key={c} active={cat === c} onClick={() => setCat(c)}>{c}</Chip>)}
      </div>

      {filtered.length === 0
        ? <Empty icon={Search} title="No open quests here" body="Try another category or a wider radius — new quests land all the time." />
        : <>
            {urgentList.length > 0 && (
              <div className="urgent-sec">
                <div className="urgent-h"><span className="urgent-pip"><Zap size={15} strokeWidth={2.8} /></span> Urgently need covered <span className="urgent-count">{urgentList.length}</span></div>
                <p className="urgent-sub">A quester had to step away — these are back on the board and the clock is ticking. Grab one and be the hero.</p>
                <div className="jobgrid">{urgentList.map(({ job: j, mi }) => <BrowseCard key={j.id} job={j} distance={mi} urgent />)}</div>
              </div>
            )}
            {regularList.length > 0 && (
              <>
                {urgentList.length > 0 && <h2 className="sub-h"><Search size={17} /> All open quests</h2>}
                <div className="jobgrid">{regularList.map(({ job: j, mi }) => <BrowseCard key={j.id} job={j} distance={mi} />)}</div>
              </>
            )}
          </>}
    </div>
  );
}

function SettingsScreen() {
  const { user, saveSettings, logout, toast, refreshProfile, switchMode, platform, deleteAccount } = useApp();
  const s = user.settings || {};
  const [name, setName] = useState(user.name);
  const [busyPay, setBusyPay] = useState(false);
  const [delOpen, setDelOpen] = useState(false);
  const [delBusy, setDelBusy] = useState(false);
  const set = patch => saveSettings(patch);
  const available = Math.max(0, (user.totalEarned || 0) - (user.paidOut || 0));
  const canNotify = ("Notification" in window) && Notification.permission === "granted";
  const notifBlocked = ("Notification" in window) && Notification.permission === "denied";

  async function toggleDevicePush(on) {
    if (!on) { set({ push: false }); toast("Device notifications off.", "info"); return; }
    if (!("Notification" in window)) { toast("This browser doesn't support notifications.", "info"); return; }
    let perm = Notification.permission;
    if (perm === "default") perm = await Notification.requestPermission();
    if (perm === "granted") {
      set({ push: true });
      subscribeToPush();
      deviceNotify("Notifications on ✅", "You'll get a heads-up here when your quests update.", { force: true });
      toast("Device notifications on.", "success");
    } else {
      set({ push: false });
      toast("Notifications are blocked — allow them for this site in your browser, then try again.", "info");
    }
  }

  async function connectPayouts() {
    setBusyPay(true);
    try {
      const origin = window.location.origin + window.location.pathname;
      const { url } = await callFn("stripe-connect", {
        action: "onboard",
        returnUrl: origin + "?connect=done",
        refreshUrl: origin + "?connect=refresh",
      });
      if (url) { window.location.href = url; return; }
      toast("Couldn't start payout setup. Try again.", "error");
    } catch (e) { toast(e.message || "Couldn't start payout setup.", "error"); }
    setBusyPay(false);
  }
  async function cashOut() {
    if (!platform.payoutsEnabled) { toast("Cashouts are paused right now — check back soon.", "info"); return; }
    if (available < platform.minCashout) { toast(`You need at least ${money(platform.minCashout)} before you can cash out.`, "info"); return; }
    setBusyPay(true);
    try {
      const r = await callFn("stripe-connect", { action: "payout" });
      toast(`Cashed out ${money(r.amount || available)} 🎉`, "success");
      await refreshProfile();
    } catch (e) { toast(e.message || "Cash out failed.", "error"); }
    setBusyPay(false);
  }

  async function doDelete() {
    setDelBusy(true);
    try {
      await deleteAccount();
      // On success the session is cleared and the app returns to the sign-in
      // screen, so this component unmounts — nothing else to do here.
    } catch (e) {
      toast((e && e.message) || "Couldn't delete account — try again.", "error");
      setDelBusy(false);
    }
  }

  return (
    <div className="page page-narrow">
      <header className="page-head"><h1>Settings</h1><p>Tune SideQuest to the way your brain works best.</p></header>

      <div className="card set-card">
        <h2 className="set-h">Profile</h2>

        <Btn variant="soft" size="sm" icon={Check} onClick={() => saveName(name)}>Save name</Btn>
        <div className="set-meta"><span className="cap">Account</span> {user.email} · {user.type === "client" ? "Client" : "Worker"}</div>
      </div>

      <div className="card set-card">
        <h2 className="set-h"><RefreshCw size={17} /> Account mode</h2>
        <p className="set-p">Switch anytime — post quests as a client, or browse and earn as a quester. It's the same account either way.</p>
        <div className="stim-toggle">
          <button className={user.type === "client" ? "on" : ""} onClick={() => switchMode("client")}>
            <Briefcase size={16} /> Client
            <small>Post &amp; manage quests</small>
          </button>
          <button className={user.type === "worker" ? "on" : ""} onClick={() => switchMode("worker")}>
            <Rocket size={16} /> Quester
            <small>Browse, claim &amp; earn</small>
          </button>
        </div>
      </div>

      <div className="card set-card">
        <h2 className="set-h"><Bell size={17} /> Notifications</h2>
        <p className="set-p">Get a notification on this device when your quests update or someone messages you.</p>
        <Toggle icon={Bell} label="Notifications on this device" hint="Claims, submissions, approvals, change requests & messages"
          on={!!s.push && canNotify} onChange={toggleDevicePush} />
        {!!s.push && canNotify && (
          <Btn variant="soft" size="sm" icon={Bell} onClick={async () => {
            toast("Sending a test push…", "info");
            const r = await sendTestPush();
            if (!r.ok) { toast("Test push failed: " + r.error, "error"); return; }
            if (r.sent > 0) toast(`Sent to ${r.sent} device${r.sent > 1 ? "s" : ""}. Check your other phone! 📲`, "success");
            else toast("Registered this phone, but no devices to send to yet. Turn notifications on (and reopen the app) on your other phone, then try again.", "info");
          }}>Send a test push</Btn>
        )}
        {notifBlocked && <p className="auth-fine">Notifications are blocked for this site in your browser — you'll need to allow them in site settings first.</p>}

function loadIdSet(key) { try { return new Set(JSON.parse(localStorage.getItem(key) || "[]")); } catch (e) { return new Set(); } }
function saveIdSet(key, set) { try { localStorage.setItem(key, JSON.stringify(Array.from(set))); } catch (e) {} }
function ProfileMenu() {
  const { user, setView, logout, jobs, msgNotifs, refreshMsgNotifs, markMsgsSeen, switchMode, supportUnread } = useApp();
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const isClient = user.type === "client";
  const seenKey = "sq_nseen_" + user.id;
  const dismKey = "sq_ndism_" + user.id;
  const [seen, setSeen] = useState(() => loadIdSet(seenKey));
  const [dismissed, setDismissed] = useState(() => loadIdSet(dismKey));

  const mine = jobs.filter(j => (isClient ? j.postedBy : j.claimedBy) === user.id);
  const all = [];
  if (isClient) {
    mine.filter(j => j.status === "submitted").forEach(j =>
      all.push({ id: "rev-" + j.id, icon: Eye, tone: "gold", text: `Review “${j.title}” — work submitted`, to: "jobs" }));
    mine.filter(j => j.status === "open" && j.releaseNote).forEach(j =>
      all.push({ id: "rel-" + j.id, icon: RefreshCw, tone: "muted", text: `“${j.title}” came back unfinished`, to: "jobs" }));
  } else {
    mine.filter(j => j.status === "claimed" && j.reviewNote).forEach(j =>
      all.push({ id: "chg-" + j.id, icon: RefreshCw, tone: "cyan", text: `Changes requested on “${j.title}”`, to: "tasks" }));
    const available = Math.max(0, (user.totalEarned || 0) - (user.paidOut || 0));
    if (available > 0) all.push({
      id: "pay", icon: DollarSign, tone: "mint", to: "settings",
      text: user.payoutsEnabled ? `${money(available)} ready to cash out` : `${money(available)} earned — set up payouts`,
    });
  }
  msgNotifs.forEach(m => {
    const job = jobs.find(j => j.id === m.jobId);
    all.push({
      id: "msg-" + m.jobId, icon: MessageCircle, tone: "primary", to: isClient ? "jobs" : "tasks",
      text: `${m.count} new message${m.count > 1 ? "s" : ""} from ${m.name || "someone"}${job ? " · " + job.title : ""}`,
    });
  });
  const visible = all.filter(n => !dismissed.has(n.id));
  const badge = visible.filter(n => !seen.has(n.id)).length;

  function markSeen() {
    const ids = new Set(visible.map(n => n.id));
    setSeen(ids); saveIdSet(seenKey, ids);
    // forget dismissals for notifications that no longer exist, so resolved
    // items can notify again if they ever recur.
    const cur = new Set(all.map(n => n.id));
    const keep = new Set(); let changed = false;
    dismissed.forEach(id => { if (cur.has(id)) keep.add(id); else changed = true; });
    if (changed) { setDismissed(keep); saveIdSet(dismKey, keep); }
  }
  function dismiss(id) {
    play("toggle");
    const next = new Set(dismissed); next.add(id);
    setDismissed(next); saveIdSet(dismKey, next);
  }
  function clearAll() {
    play("toggle");
    const next = new Set(dismissed); visible.forEach(n => next.add(n.id));
    setDismissed(next); saveIdSet(dismKey, next);
  }

  function close() { setOpen(false); markMsgsSeen(); }
  function toggle() { if (open) close(); else { setOpen(true); play("pop"); refreshMsgNotifs(); markSeen(); } }
  function go(to) { setView(to); close(); }

  useEffect(() => {
    if (!open) return;
    const onDoc = e => { if (ref.current && !ref.current.contains(e.target)) close(); };
    const onKey = e => { if (e.key === "Escape") close(); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
    /* eslint-disable-next-line */
  }, [open]);

  const shortcuts = isClient
    ? [["Post a quest", Plus, "post"], ["My quests", Briefcase, "jobs"], ["Settings", Settings, "settings"]]
    : [["Browse quests", Search, "browse"], ["My tasks", ListChecks, "tasks"], ["Rewards", Trophy, "rewards"], ["Earnings & payouts", DollarSign, "settings"], ["Settings", Settings, "settings"]];

  return (
    <div className="profile-menu" ref={ref}>
      <button className={`nav-user ${open ? "on" : ""}`} onClick={toggle} aria-label="Profile & notifications">
        <span className="nav-ava">{(user.name || "?")[0]}</span>
        {badge > 0 && <span className="notif-badge">{badge > 9 ? "9+" : badge}</span>}
      </button>
      {open && (
        <div className="pm-pop">
          <div className="pm-head">
            <span className="nav-ava lg">{(user.name || "?")[0]}</span>
            <div className="pm-id">
              <div className="pm-name">{user.name}</div>
              <div className="pm-sub">{user.email} · {isClient ? "Client" : "Quester"}</div>
            </div>
          </div>

          <button className="pm-mode" onClick={() => { switchMode(isClient ? "worker" : "client"); close(); }}>
            <RefreshCw size={15} strokeWidth={2.4} />
            <span>Switch to <strong>{isClient ? "Quester" : "Client"}</strong> mode</span>
          </button>

          <div className="pm-sect-t pm-sect-row">
            <span>Notifications</span>
            {visible.length > 0 && <button className="pm-clear" onClick={clearAll}>Clear all</button>}
          </div>
          <div className="pm-notifs">
            {visible.length === 0
              ? <div className="pm-empty">You're all caught up ✨</div>
              : visible.map(n => {
                const NIcon = n.icon;
                return (
                  <div key={n.id} className="pm-notif">
                    <button className="pm-ntap" onClick={() => go(n.to)}>
                      <span className={`pm-nic tone-${n.tone}`}><NIcon size={14} strokeWidth={2.5} /></span>
                      <span className="pm-ntext">{n.text}</span>
                    </button>
                    <button className="pm-nx" onClick={() => dismiss(n.id)} aria-label="Dismiss notification"><X size={13} strokeWidth={2.6} /></button>
                  </div>
                );
              })}
          </div>

          <div className="pm-sect-t">Shortcuts</div>
          <div className="pm-links">
            {shortcuts.map(([label, Icon, to]) => (
              <button key={to + label} className="pm-link" onClick={() => go(to)}>
                <Icon size={15} strokeWidth={2.3} /><span>{label}</span>
              </button>
            ))}
            {user.isAdmin && (
              <button className="pm-link pm-admin" onClick={() => go("admin")}>
                <ShieldCheck size={15} strokeWidth={2.3} /><span>Admin controls</span>
              </button>
            )}
            <button className="pm-link" onClick={() => go("support")}>
              <LifeBuoy size={15} strokeWidth={2.3} />
              <span>{user.isAdmin ? "Support inbox" : "Help & support"}</span>
              {supportUnread > 0 && <span className="pm-link-badge">{supportUnread > 9 ? "9+" : supportUnread}</span>}
            </button>
            <button className="pm-link danger" onClick={() => { setOpen(false); logout(); }}>
              <LogOut size={15} strokeWidth={2.3} /><span>Log out</span>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
