/* ============================================================
   CITY SCOREBOARD — top earners in the quester's city, with fun awards.
   Backed by the city_leaderboard() RPC (safe: names + stats only).
   ============================================================ */
const PODIUM_TITLES = ["City Legend", "Quest Master", "Rising Hero"];
const PODIUM_MEDAL = ["🥇", "🥈", "🥉"];

function CityScoreboard() {
  const { user, cityLeaderboard, setHomeLocation } = useApp();
  const [rows, setRows] = useState(null);
  const [err, setErr] = useState("");

  useEffect(() => {
    let cancel = false;
    (async () => {
      setRows(null); setErr("");
      let city = user.city;
      // Backfill city for users who set their location before this feature.
      if (!city && user.homeLat != null && user.homeLng != null) {
        try {
          const r = await reverseGeocode(user.homeLat, user.homeLng);
          if (r && r.city) {
            city = r.city;
            await supabase.from("profiles").update({ city }).eq("id", user.id);
            if (!cancel) setHomeLocation(user.homeLat, user.homeLng, city);
          }
        } catch (e) { /* ignore */ }
      }
      try { const data = await cityLeaderboard(); if (!cancel) setRows(data); }
      catch (e) { if (!cancel) { setErr((e && e.message) || "Couldn't load the scoreboard."); setRows([]); } }
    })();
    return () => { cancel = true; };
    /* eslint-disable-next-line */
  }, []);

  if (user.homeLat == null && !user.city) {
    return (
      <div className="card score-card">
        <h2 className="sub-h"><Trophy size={18} /> City scoreboard</h2>
        <Empty icon={MapPin} title="Set your location" body="Add your area on the Browse tab to see how you stack up against earners in your city." />
      </div>
    );
  }
  if (rows === null) {
    return (
      <div className="card score-card">
        <h2 className="sub-h"><Trophy size={18} /> City scoreboard</h2>
        <div className="score-loading">Loading your city's leaderboard…</div>
      </div>
    );
  }

  const cityName = user.city || "your city";
  const earners = rows.filter(r => Number(r.total_earned) > 0);
  const podium = earners.slice(0, 3);
  const rest = earners.slice(3);
  const myRank = rows.findIndex(r => r.is_me);
  const me = myRank >= 0 ? rows[myRank] : null;

  const topBy = pick => { let best = null; rows.forEach(r => { const v = Number(pick(r)) || 0; if (v > 0 && (!best || v > (Number(pick(best)) || 0))) best = r; }); return best; };
  const awards = [
    { title: "The Machine", sub: "Most quests completed", icon: Rocket, cls: "aw-mach", win: topBy(r => r.completed_count), fmt: r => r.completed_count + " quest" + (r.completed_count === 1 ? "" : "s") },
    { title: "Streak Lord", sub: "Longest active streak", icon: Flame, cls: "aw-streak", win: topBy(r => r.streak), fmt: r => r.streak + "-day streak" },
    { title: "XP Overlord", sub: "Highest level reached", icon: Star, cls: "aw-xp", win: topBy(r => r.level), fmt: r => "Level " + r.level },
  ].filter(a => a.win);

  return (
    <div className="card score-card">
      <div className="score-head">
        <h2 className="sub-h" style={{ margin: 0 }}><Trophy size={18} /> {cityName} scoreboard</h2>
        <span className="score-sub">Top earners near you</span>
      </div>

      {podium.length === 0 ? (
        <Empty icon={DollarSign} title="No earnings yet" body={`Be the first to top the board in ${cityName} — finish a quest to claim the crown.`} />
      ) : (
        <>
          <div className="podium">
            {podium.map((r, i) => (
              <div key={r.id} className={`pod pod-${i + 1} ${r.is_me ? "me" : ""}`}>
                <div className="pod-medal">{PODIUM_MEDAL[i]}</div>
                <div className="pod-title">{PODIUM_TITLES[i]}</div>
                <div className="pod-name">{r.is_me ? "You" : (r.name || "Quester")}</div>
                <div className="pod-earn">{money(r.total_earned)}</div>
              </div>
            ))}
          </div>

          {rest.length > 0 && (
            <div className="score-list">
              {rest.map((r, i) => (
                <div key={r.id} className={`score-row ${r.is_me ? "me" : ""}`}>
                  <span className="score-rank">{i + 4}</span>
                  <span className="score-name">{r.is_me ? "You" : (r.name || "Quester")}</span>
                  <span className="score-earn">{money(r.total_earned)}</span>
                </div>
              ))}
            </div>
          )}

          {me && myRank > 2 && (
            <div className="score-you"><Sparkles size={14} strokeWidth={2.4} /> You're #{myRank + 1} in {cityName} with {money(me.total_earned)} earned. Keep questing!</div>
          )}

          {awards.length > 0 && (
            <>
              <h3 className="score-aw-h">Hall of fame</h3>
              <div className="score-awards">
                {awards.map((a, i) => {
                  const Ic = a.icon;
                  return (
                    <div key={i} className={`aw ${a.cls} ${a.win.is_me ? "me" : ""}`}>
                      <span className="aw-ic"><Ic size={16} strokeWidth={2.5} /></span>
                      <div className="aw-meta"><div className="aw-title">{a.title}</div><div className="aw-sub">{a.sub}</div></div>
                      <div className="aw-win"><div className="aw-who">{a.win.is_me ? "You" : (a.win.name || "Quester")}</div><div className="aw-stat">{a.fmt(a.win)}</div></div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

/* ============================================================
   SCHEDULE — calendar + day timeline + drag-and-drop to-do board.
   Both roles get it ("same same but different"): questers see their claimed
   quests + reminder controls; clients see their posted quests. The to-do board
   is personal and saved in the user's settings.
   ============================================================ */
const KB_LANES = [["todo", "To do"], ["doing", "Doing"], ["done", "Done"]];

function ScheduleScreen() {
  const { user, jobs } = useApp();
  const isClient = user.type === "client";
  const myJobs = jobs.filter(j => (isClient ? j.postedBy : j.claimedBy) === user.id);
  const [selected, setSelected] = useState(() => startOfDay(Date.now()));

  const entries = [];
  myJobs.forEach(j => {
    if (j.scheduledTime) entries.push({ job: j, time: j.scheduledTime, kind: "start" });
    if (j.deadline) entries.push({ job: j, time: j.deadline, kind: "due" });
  });

  return (
    <div className="page page-narrow sched-page">
      <header className="page-head"><h1><CalendarDays size={22} strokeWidth={2.5} style={{ verticalAlign: "-3px" }} /> Schedule</h1>
        <p>{isClient ? "Your quests and deadlines on a calendar, plus a board to plan." : "See your day hour-by-hour, plan your tasks, and stay ahead of deadlines."}</p></header>
      <MiniCalendar selected={selected} setSelected={setSelected} entries={entries} />
      <DayTimeline selected={selected} entries={entries} isClient={isClient} />
      {!isClient && <ReminderSettings />}
      <KanbanBoard />
    </div>
  );
}

function MiniCalendar({ selected, setSelected, entries }) {
  const [cursor, setCursor] = useState(() => { const d = new Date(selected); d.setDate(1); d.setHours(0, 0, 0, 0); return d; });
  const year = cursor.getFullYear(), month = cursor.getMonth();
  const startWeekday = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = startOfDay(Date.now());
  const dotDays = new Set(entries.map(e => ymd(e.time)));
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d).getTime());
  const shift = delta => { const d = new Date(cursor); d.setMonth(d.getMonth() + delta); setCursor(d); play("click"); };
  const WD = ["S", "M", "T", "W", "T", "F", "S"];
  return (
    <div className="card cal-card">
      <div className="cal-head">
        <button className="cal-nav" onClick={() => shift(-1)} aria-label="Previous month"><ChevronLeft size={18} strokeWidth={2.4} /></button>
        <div className="cal-title">{monthLabel(cursor)}</div>
        <button className="cal-nav" onClick={() => shift(1)} aria-label="Next month"><ChevronRight size={18} strokeWidth={2.4} /></button>
      </div>
      <div className="cal-grid cal-wd">{WD.map((w, i) => <div key={i} className="cal-wd-c">{w}</div>)}</div>
      <div className="cal-grid">
        {cells.map((ts, i) => {
          if (ts == null) return <div key={i} className="cal-cell empty" />;
          const isSel = startOfDay(ts) === startOfDay(selected);
          const isToday = startOfDay(ts) === today;
          return (
            <button key={i} className={`cal-cell ${isSel ? "sel" : ""} ${isToday ? "today" : ""}`} onClick={() => { setSelected(startOfDay(ts)); play("pop"); }}>
              {new Date(ts).getDate()}
              {dotDays.has(ymd(ts)) && <span className="cal-dot" />}
            </button>
          );
        })}
      </div>
      <button className="cal-today" onClick={() => { const t = startOfDay(Date.now()); setSelected(t); const d = new Date(t); d.setDate(1); setCursor(d); play("click"); }}>Jump to today</button>
    </div>
  );
}

function TimelineItem({ e, isClient }) {
  const j = e.job;
  const isDue = e.kind === "due";
  return (
    <div className={`tl-item ${isDue ? "due" : "start"}`}>
      <span className="tl-time">{clockTime(e.time)}</span>
      <span className="tl-main">
        <span className="tl-title">{j.title}</span>
        <span className="tl-sub">{isDue ? "Due" : "Starts"} · {j.category}{isClient && j.claimedByName ? " · " + j.claimedByName : ""}</span>
      </span>
      <StatusBadge status={j.status} />
    </div>
  );
}

function DayTimeline({ selected, entries, isClient }) {
  const dayEntries = entries.filter(e => startOfDay(e.time) === startOfDay(selected)).sort((a, b) => a.time - b.time);
  const HOURS = []; for (let h = 6; h <= 23; h++) HOURS.push(h);
  const inRange = dayEntries.filter(e => { const h = new Date(e.time).getHours(); return h >= 6 && h <= 23; });
  const outRange = dayEntries.filter(e => { const h = new Date(e.time).getHours(); return h < 6 || h > 23; });
  const dateLabel = new Date(selected).toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
  return (
    <div className="card day-card">
      <div className="day-head"><Clock size={16} /> {dateLabel}</div>
      {dayEntries.length === 0 && <div className="day-empty">Nothing scheduled this day. Enjoy the breathing room — or plan something on the board below.</div>}
      {outRange.length > 0 && (
        <div className="day-other">
          <div className="day-other-h">Outside 6am–11pm</div>
          {outRange.map((e, i) => <TimelineItem key={i} e={e} isClient={isClient} />)}
        </div>
      )}
      {dayEntries.length > 0 && (
        <div className="hours">
          {HOURS.map(h => {
            const items = inRange.filter(e => new Date(e.time).getHours() === h);
            return (
              <div key={h} className={`hour-row ${items.length ? "has" : ""}`}>
                <div className="hour-label">{hourLabel(h)}</div>
                <div className="hour-slot">{items.map((e, i) => <TimelineItem key={i} e={e} isClient={isClient} />)}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ReminderSettings() {
  const { user, saveSettings } = useApp();
  const s = user.settings || {};
  const set = patch => saveSettings(patch);
  const canPush = !!s.push;
  const [startMin, setStartMin] = useState(s.remindStartMin ?? 30);
  const [dlMin, setDlMin] = useState(s.remindDeadlineMin ?? 120);
  return (
    <div className="card set-card">
      <h2 className="set-h"><Bell size={17} /> Reminders</h2>
      <p className="set-p">Gentle nudges so a quest never sneaks up on you. These pop up while the app is open or installed.</p>
      <Toggle icon={Clock} label="Remind me before a quest starts" hint="A heads-up ahead of your scheduled start time" on={s.remindStart !== false} onChange={v => set({ remindStart: v })} />
      {s.remindStart !== false && (
        <label className="field"><span className="field-label">Minutes before start</span>
          <input className="field-input" type="number" min="5" max="240" step="5" value={startMin}
            onChange={e => setStartMin(e.target.value)}
            onBlur={() => { const v = Math.max(5, Math.min(240, Number(startMin) || 30)); setStartMin(v); set({ remindStartMin: v }); }} /></label>
      )}
      <Toggle icon={Timer} label="Remind me before a deadline" hint="So there's time to finish and submit" on={s.remindDeadline !== false} onChange={v => set({ remindDeadline: v })} />
      {s.remindDeadline !== false && (
        <label className="field"><span className="field-label">Minutes before deadline</span>
          <input className="field-input" type="number" min="15" max="1440" step="15" value={dlMin}
            onChange={e => setDlMin(e.target.value)}
            onBlur={() => { const v = Math.max(15, Math.min(1440, Number(dlMin) || 120)); setDlMin(v); set({ remindDeadlineMin: v }); }} /></label>
      )}
      {!canPush && <p className="rem-hint"><Bell size={13} /> Tip: turn on device notifications in Settings so these show even when you're not looking at this tab.</p>}
    </div>
  );
}

function KanbanBoard() {
  const { user, saveSettings } = useApp();
  const todos = Array.isArray(user.settings && user.settings.todos) ? user.settings.todos : [];
  const [dragId, setDragId] = useState(null);
  const [overLane, setOverLane] = useState(null);
  const [adding, setAdding] = useState({});

  const save = next => saveSettings({ todos: next });
  function addCard(lane) {
    const text = (adding[lane] || "").trim();
    if (!text) return;
    save([...todos, { id: genId(), lane, body: text }]);
    setAdding(a => ({ ...a, [lane]: "" }));
    play("pop");
  }
  function removeCard(id) { play("toggle"); save(todos.filter(t => t.id !== id)); }
  function drop(lane, beforeId) {
    if (!dragId) return;
    const dragged = todos.find(t => t.id === dragId);
    if (!dragged) { setDragId(null); setOverLane(null); return; }
    const without = todos.filter(t => t.id !== dragId);
    let idx;
    if (beforeId && beforeId !== dragId) {
      idx = without.findIndex(t => t.id === beforeId);
      if (idx < 0) idx = without.length;
    } else {
      let last = -1;
      without.forEach((t, i) => { if (t.lane === lane) last = i; });
      idx = last + 1;
    }
    without.splice(idx, 0, { ...dragged, lane });
    save(without);
    setDragId(null); setOverLane(null);
    play("click");
  }
  return (
    <div className="card kb-card">
      <h2 className="set-h"><ListChecks size={17} /> To-do board</h2>
      <p className="set-p">Brain-dump here and drag tasks across as you go. It's just for you.</p>
      <div className="kb">
        {KB_LANES.map(([lane, label]) => {
          const cards = todos.filter(t => t.lane === lane);
          return (
            <div key={lane} className={`kb-lane ${overLane === lane ? "over" : ""}`}
              onDragOver={e => { e.preventDefault(); setOverLane(lane); }}
              onDragLeave={() => setOverLane(o => (o === lane ? null : o))}
              onDrop={e => { e.preventDefault(); drop(lane, null); }}>
              <div className="kb-lane-h"><span>{label}</span><span className="kb-count">{cards.length}</span></div>
              <div className="kb-cards">
                {cards.length === 0 && <div className="kb-empty">Drop tasks here</div>}
                {cards.map(c => (
                  <div key={c.id} className={`kb-item ${dragId === c.id ? "dragging" : ""}`} draggable
                    onDragStart={() => { setDragId(c.id); play("tick"); }}
                    onDragEnd={() => { setDragId(null); setOverLane(null); }}
                    onDragOver={e => e.preventDefault()}
                    onDrop={e => { e.preventDefault(); e.stopPropagation(); drop(lane, c.id); }}>
                    <span className="kb-grip"><GripVertical size={14} /></span>
                    <span className="kb-body">{c.body}</span>
                    <button className="kb-x" onClick={() => removeCard(c.id)} aria-label="Delete task"><X size={13} strokeWidth={2.6} /></button>
                  </div>
                ))}
              </div>
              <div className="kb-add">
                <input value={adding[lane] || ""} onChange={e => setAdding(a => ({ ...a, [lane]: e.target.value }))}
                  onKeyDown={e => e.key === "Enter" && addCard(lane)} placeholder="Add a task…" maxLength={140} />
                <button className="kb-add-btn" onClick={() => addCard(lane)} aria-label="Add task"><Plus size={15} strokeWidth={2.6} /></button>
              </div>
            </div>
          );
        })}
      </div>
      <p className="kb-tip">Tip: drag with a mouse or trackpad. On a card, drop onto another to reorder; drop on a column to move it there.</p>
    </div>
  );
}

/* ============================================================
   SUPPORT — help desk: FAQ + live chat to the admin.
   Users see FAQ + their own chat thread. Admins see an inbox of every
   thread and can reply. Backed by the support_messages table (RLS + Realtime).
   ============================================================ */
const SUPPORT_FAQ = [
  { q: "How does SideQuest work?", a: "Clients post quests — small tasks with a flat payout and a deadline. Questers browse the board, claim one that fits their energy, break it into steps, do it, and submit a photo as proof. Once the client approves, the quester gets paid." },
  { q: "How and when do I get paid?", a: "Your earnings build up as you complete quests. Go to Earnings & payouts, connect a payout account (Stripe handles this securely), then cash out anytime. Your first payout takes about 7–14 days while Stripe verifies you; after that, deposits usually arrive within ~2 business days." },
  { q: "Is there a fee?", a: "The platform keeps a small commission on each completed quest. You always see your exact take-home — the “You earn $X” line — on every quest before you claim it, so there are never surprises. Clients always pay the full posted amount." },
  { q: "What if my work isn't approved?", a: "The client can send it back with notes asking for changes, and you can fix it and resubmit. If something ever feels unfair, message us right here and we'll help sort it out." },
  { q: "What happens if a deadline passes?", a: "If a quest isn't finished by its deadline, it closes automatically and the client is refunded in full. As a quester, claim only what you're confident you can finish in time." },
  { q: "How do I cancel a quest I posted?", a: "Open it under My Quests. If no one has claimed it yet, canceling refunds you instantly. If a quester already started, they'll be asked to approve the cancellation — in case they've already done the work." },
  { q: "Is my payment information secure?", a: "Yes — all payments and payouts are processed by Stripe. SideQuest never sees or stores your full card or bank details." },
  { q: "How do I delete my account?", a: "Go to Settings and scroll down to Delete account. Heads up: cash out any earnings first, because deleting is permanent." },
];

function SupportScreen() {
  const { user } = useApp();
  return user.isAdmin ? <AdminSupport /> : <UserSupport />;
}

function UserSupport() {
  const { user, refreshSupportUnread, toast } = useApp();
  const [thread, setThread] = useState([]);
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(true);
  const [openQ, setOpenQ] = useState(null);
  const endRef = useRef(null);

  async function markRead() {
    try {
      await supabase.from("support_messages").update({ read_by_user: true })
        .eq("user_id", user.id).eq("sender", "admin").eq("read_by_user", false);
      refreshSupportUnread();
    } catch (e) { /* ignore */ }
  }
  async function load() {
    setLoading(true);
    const { data } = await supabase.from("support_messages").select("*")
      .eq("user_id", user.id).order("created_at", { ascending: true });
    setThread(data || []);
    setLoading(false);
    markRead();
  }
  useEffect(() => {
    load();
    const ch = supabase.channel("support-user-" + user.id)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "support_messages", filter: "user_id=eq." + user.id },
        payload => {
          const r = payload.new;
          setThread(prev => prev.some(m => m.id === r.id) ? prev : [...prev, r]);
          if (r.sender === "admin") markRead();
        })
      .subscribe();
    return () => { try { supabase.removeChannel(ch); } catch (e) {} };
    /* eslint-disable-next-line */
  }, []);
  useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ behavior: "smooth", block: "end" }); }, [thread]);

  async function send() {
    const body = text.trim();
    if (!body) return;
    setText("");
    const row = { user_id: user.id, user_email: user.email || "", user_name: user.name || "", sender: "user", body, created_at: Date.now(), read_by_admin: false, read_by_user: true };
    const { data, error } = await supabase.from("support_messages").insert(row).select().single();
    if (error) { toast("Message didn't send — try again.", "error"); setText(body); return; }
    play("click");
    if (data) setThread(prev => prev.some(m => m.id === data.id) ? prev : [...prev, data]);
  }

  return (
    <div className="page page-narrow">
      <header className="page-head"><h1><LifeBuoy size={22} strokeWidth={2.5} style={{ verticalAlign: "-3px" }} /> Help &amp; support</h1><p>Find a quick answer below, or message us directly — we're happy to help.</p></header>

      <div className="card set-card">
        <h2 className="set-h"><HelpCircle size={17} /> Common questions</h2>
        <div className="faq">
          {SUPPORT_FAQ.map((item, i) => (
            <div key={i} className={`faq-item ${openQ === i ? "open" : ""}`}>
              <button className="faq-q" onClick={() => { setOpenQ(openQ === i ? null : i); play("toggle"); }}>
                <span>{item.q}</span><ChevronDown size={16} strokeWidth={2.4} className="faq-chev" />
              </button>
              {openQ === i && <div className="faq-a">{item.a}</div>}
            </div>
          ))}
        </div>
      </div>

      <div className="card set-card">
        <h2 className="set-h"><MessageSquare size={17} /> Message us</h2>
        <p className="set-p">Send a note to the SideQuest team. Replies show up right here — keep this page handy or check back anytime.</p>
        <div className="support-chat">
          <div className="chat-msgs support-msgs">
            {loading && <div className="chat-empty">Loading…</div>}
            {!loading && thread.length === 0 && <div className="chat-empty">No messages yet — ask us anything 👋</div>}
            {thread.map(m => (
              <div key={m.id} className={`bubble ${m.sender === "user" ? "mine" : ""}`}>
                {m.sender === "admin" && <span className="bubble-name">SideQuest team</span>}
                <span className="bubble-text">{m.body}</span>
              </div>
            ))}
            <div ref={endRef} />
          </div>
          <div className="chat-input">
            <input value={text} onChange={e => setText(e.target.value)}
              onKeyDown={e => e.key === "Enter" && send()} placeholder="Type your message…" maxLength={1000} />
            <button className="chat-send" onClick={send} aria-label="Send message"><Send size={16} strokeWidth={2.4} /></button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AdminSupport() {
  const { refreshSupportUnread, toast } = useApp();
  const [convos, setConvos] = useState([]);
  const [activeUid, setActiveUid] = useState(null);
  const [thread, setThread] = useState([]);
  const [text, setText] = useState("");
  const [loadingList, setLoadingList] = useState(true);
  const endRef = useRef(null);
  const activeRef = useRef(null);
  useEffect(() => { activeRef.current = activeUid; }, [activeUid]);

  async function loadInbox() {
    setLoadingList(true);
    const { data } = await supabase.from("support_messages").select("*")
      .order("created_at", { ascending: false }).limit(800);
    const rows = data || [];
    const map = new Map();
    rows.forEach(r => {
      if (!map.has(r.user_id)) {
        map.set(r.user_id, { userId: r.user_id, name: r.user_name || "Someone", email: r.user_email || "", last: r.body, lastAt: r.created_at, lastSender: r.sender, unread: 0 });
      }
      if (r.sender === "user" && !r.read_by_admin) map.get(r.user_id).unread++;
    });
    setConvos(Array.from(map.values()).sort((a, b) => b.lastAt - a.lastAt));
    setLoadingList(false);
  }
  async function openConvo(uid, quiet) {
    setActiveUid(uid);
    const { data } = await supabase.from("support_messages").select("*")
      .eq("user_id", uid).order("created_at", { ascending: true });
    setThread(data || []);
    try {
      await supabase.from("support_messages").update({ read_by_admin: true })
        .eq("user_id", uid).eq("sender", "user").eq("read_by_admin", false);
      refreshSupportUnread();
      if (!quiet) loadInbox();
    } catch (e) { /* ignore */ }
  }
  useEffect(() => {
    loadInbox();
    const ch = supabase.channel("support-admin")
      .on("postgres_changes", { event: "*", schema: "public", table: "support_messages" },
        () => { loadInbox(); if (activeRef.current) openConvo(activeRef.current, true); })
      .subscribe();
    return () => { try { supabase.removeChannel(ch); } catch (e) {} };
    /* eslint-disable-next-line */
  }, []);
  useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ behavior: "smooth", block: "end" }); }, [thread]);

  async function reply() {
    const body = text.trim();
    if (!body || !activeUid) return;
    const conv = convos.find(c => c.userId === activeUid) || {};
    setText("");
    const row = { user_id: activeUid, user_email: conv.email || "", user_name: conv.name || "", sender: "admin", body, created_at: Date.now(), read_by_admin: true, read_by_user: false };
    const { data, error } = await supabase.from("support_messages").insert(row).select().single();
    if (error) { toast("Reply didn't send — try again.", "error"); setText(body); return; }
    play("click");
    if (data) setThread(prev => prev.some(m => m.id === data.id) ? prev : [...prev, data]);
    loadInbox();
  }

  const active = convos.find(c => c.userId === activeUid);

  return (
    <div className="page page-narrow">
      <header className="page-head"><h1><Inbox size={22} strokeWidth={2.5} style={{ verticalAlign: "-3px" }} /> Support inbox</h1><p>Messages from your users. Tap a conversation to read and reply.</p></header>

      {!activeUid && (
        <div className="card set-card">
          {loadingList && <div className="chat-empty">Loading…</div>}
          {!loadingList && convos.length === 0 && <Empty icon={MessageSquare} title="No messages yet" body="When someone messages support, their conversation shows up here." />}
          {convos.length > 0 && (
            <div className="sup-list">
              {convos.map(c => (
                <button key={c.userId} className="sup-row" onClick={() => openConvo(c.userId)}>
                  <span className="sup-ava">{(c.name || "?")[0]}</span>
                  <span className="sup-meta">
                    <span className="sup-name">{c.name} {c.unread > 0 && <span className="sup-dot">{c.unread}</span>}</span>
                    <span className="sup-last">{c.lastSender === "admin" ? "You: " : ""}{c.last.length > 60 ? c.last.slice(0, 60) + "…" : c.last}</span>
                  </span>
                  <ChevronRight size={16} className="sup-chev" />
                </button>
              ))}
            </div>
          )}
        </div>
      )}

      {activeUid && (
        <div className="card set-card">
          <button className="sup-back" onClick={() => { setActiveUid(null); loadInbox(); }}>
            <ArrowLeft size={15} strokeWidth={2.4} /> All conversations
          </button>
          <div className="sup-head">
            <span className="sup-ava lg">{(active?.name || "?")[0]}</span>
            <div><div className="sup-name">{active?.name || "User"}</div><div className="sup-email">{active?.email}</div></div>
          </div>
          <div className="support-chat">
            <div className="chat-msgs support-msgs tall">
              {thread.length === 0 && <div className="chat-empty">No messages.</div>}
              {thread.map(m => (
                <div key={m.id} className={`bubble ${m.sender === "admin" ? "mine" : ""}`}>
                  {m.sender === "user" && <span className="bubble-name">{m.user_name || "User"}</span>}
                  <span className="bubble-text">{m.body}</span>
                </div>
              ))}
              <div ref={endRef} />
            </div>
            <div className="chat-input">
              <input value={text} onChange={e => setText(e.target.value)}
                onKeyDown={e => e.key === "Enter" && reply()} placeholder="Type your reply…" maxLength={1000} />
              <button className="chat-send" onClick={reply} aria-label="Send reply"><Send size={16} strokeWidth={2.4} /></button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================

function AdminScreen() {
  const { platform, savePlatform, toast, refreshJobs, user, setUserAdmin, listAdmins } = useApp();
  const [f, setF] = useState(platform);
  const [busy, setBusy] = useState(false);
  const [cleaning, setCleaning] = useState(false);
  const [admins, setAdmins] = useState([]);
  const [grantEmail, setGrantEmail] = useState("");
  const [granting, setGranting] = useState(false);
  useEffect(() => { setF(platform); }, [platform]);
  const set = (k, v) => setF(prev => ({ ...prev, [k]: v }));
  const num = (k, v) => set(k, v === "" ? "" : Number(v));
  async function save() { setBusy(true); await savePlatform(f); setBusy(false); }

  async function runCleanup() {
    const days = Math.max(0, Math.round(Number(f.messageRetentionDays) || 0));
    const when = days === 0
      ? "as soon as they finished"
      : "more than " + days + " day" + (days === 1 ? "" : "s") + " ago";
    if (!window.confirm(
      "Remove chat from quests that finished " + when +
      ", plus any abandoned (never-paid) checkouts?\n\n" +
      "Your quests, payments, payout history, and proof photos are all kept. This cannot be undone."
    )) return;
    setCleaning(true);
    try {
      const { data, error } = await supabase.rpc("cleanup_redundant_data", { grace_days: days });
      if (error) throw error;
      const m = (data && data.messages_deleted) || 0;
      const j = (data && data.pending_jobs_deleted) || 0;
      if (m === 0 && j === 0) toast("Already tidy — nothing redundant to remove.");
      else toast("Cleaned up " + m + " old message" + (m === 1 ? "" : "s") +
                 " and " + j + " abandoned checkout" + (j === 1 ? "" : "s") + ".", "success");
      if (refreshJobs) refreshJobs();
    } catch (e) {
      toast((e && e.message) || "Cleanup failed.", "error");
    }
    setCleaning(false);
  }

  async function loadAdmins() {
    try { setAdmins(await listAdmins()); } catch (e) { /* ignore */ }
  }
  useEffect(() => { loadAdmins(); /* eslint-disable-next-line */ }, []);

  async function grant() {
    const email = grantEmail.trim();
    if (!email) return;
    setGranting(true);
    try {
      const r = await setUserAdmin(email, true);
      toast((r && (r.name || r.email) ? (r.name || r.email) : "They") + " is now an admin.", "success");
      setGrantEmail("");
      loadAdmins();
    } catch (e) { toast((e && e.message) || "Couldn't grant admin.", "error"); }
    setGranting(false);
  }
  async function revoke(a) {
    if (!window.confirm("Remove admin access for " + (a.name || a.email) + "?")) return;
    try {
      await setUserAdmin(a.email, false);
      toast("Admin access removed for " + (a.name || a.email) + ".", "success");
      loadAdmins();
    } catch (e) { toast((e && e.message) || "Couldn't update access.", "error"); }
  }

  const sample = 100;
  const pct = Math.min(100, Math.max(0, Number(f.commissionPct) || 0));
  const net = Math.round(sample * (1 - pct / 100));

  return (
    <div className="page page-narrow">
      <header className="page-head"><h1><ShieldCheck size={22} strokeWidth={2.5} style={{ verticalAlign: "-3px" }} /> Admin controls</h1><p>These apply to the whole platform. You can still post and complete quests like anyone else.</p></header>

      <div className="card set-card">
        <h2 className="set-h"><DollarSign size={17} /> Commission</h2>
        <p className="set-p">The cut your company keeps from every completed quest. The quester receives the rest; the client always pays the full payout.</p>
        <label className="field"><span className="field-label">Commission (%)</span>
          <input className="field-input" type="number" min="0" max="100" step="0.5" value={f.commissionPct} onChange={e => num("commissionPct", e.target.value)} /></label>
        <p className="admin-preview"><Sparkles size={13} /> On a {money(sample)} quest, the quester nets <strong>{money(net)}</strong> and you keep <strong>{money(sample - net)}</strong>.</p>
      </div>

      <div className="card set-card">
        <h2 className="set-h"><Briefcase size={17} /> Quest rules</h2>
        <div className="grid-2">
          <label className="field"><span className="field-label">Min payout ($)</span>
            <input className="field-input" type="number" min="0" value={f.minPayout} onChange={e => num("minPayout", e.target.value)} /></label>
          <label className="field"><span className="field-label">Max payout ($, 0 = none)</span>
            <input className="field-input" type="number" min="0" value={f.maxPayout} onChange={e => num("maxPayout", e.target.value)} /></label>
        </div>
        <label className="field"><span className="field-label">Max active quests per client (0 = unlimited)</span>
          <input className="field-input" type="number" min="0" value={f.maxActiveJobs} onChange={e => num("maxActiveJobs", e.target.value)} /></label>
        <Toggle icon={Plus} label="Allow new quest posts" hint="Turn off to pause all new postings platform-wide" on={f.postingEnabled} onChange={v => set("postingEnabled", v)} />
      </div>

      <div className="card set-card">
        <h2 className="set-h"><User size={17} /> Accounts</h2>
        <label className="field"><span className="field-label">Max total accounts (0 = unlimited)</span>
          <input className="field-input" type="number" min="0" value={f.maxAccounts} onChange={e => num("maxAccounts", e.target.value)} /></label>
        <Toggle icon={User} label="Allow new signups" hint="Turn off to close registration" on={f.signupsEnabled} onChange={v => set("signupsEnabled", v)} />
      </div>

      <div className="card set-card">
        <h2 className="set-h"><ShieldCheck size={17} /> Admin access</h2>
        <p className="set-p">Admins can change these platform settings and answer support. Grant access by email — the person needs a SideQuest account already.</p>
        <div className="grant-row">
          <input className="field-input" type="email" placeholder="person@email.com" value={grantEmail}
            onChange={e => setGrantEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && grant()} />
          <Btn variant="primary" icon={UserPlus} onClick={grant} disabled={granting || !grantEmail.trim()} sound="success">{granting ? "Granting…" : "Make admin"}</Btn>
        </div>
        <div className="admin-list">
          {admins.length === 0 && <div className="admin-empty">No admins loaded.</div>}
          {admins.map(a => (
            <div key={a.id} className="admin-row">
              <span className="admin-ava"><ShieldCheck size={13} strokeWidth={2.5} /></span>
              <span className="admin-meta">
                <span className="admin-name">{a.name || "—"}{a.id === user.id && <span className="admin-you">you</span>}</span>
                <span className="admin-mail">{a.email}</span>
              </span>
              {a.id === user.id
                ? <span className="admin-locked">can't remove self</span>
                : <button className="admin-revoke" onClick={() => revoke(a)}><UserX size={14} strokeWidth={2.4} /> Remove</button>}
            </div>
          ))}
        </div>
      </div>

      <div className="card set-card">
        <h2 className="set-h"><TrendingUp size={17} /> Payouts</h2>
        <label className="field"><span className="field-label">Minimum balance to cash out ($)</span>
          <input className="field-input" type="number" min="0" value={f.minCashout} onChange={e => num("minCashout", e.target.value)} /></label>
        <Toggle icon={TrendingUp} label="Allow quester cashouts" hint="Turn off to pause withdrawals" on={f.payoutsEnabled} onChange={v => set("payoutsEnabled", v)} />
      </div>

      <div className="card set-card">
        <h2 className="set-h"><Bell size={17} /> Announcement banner</h2>
        <p className="set-p">Shown at the top of the app for everyone while it isn't empty.</p>
        <textarea className="field-input field-area" rows={2} placeholder="e.g. Heads up — scheduled maintenance Sunday 2–3am" value={f.announcement} onChange={e => set("announcement", e.target.value)} />
      </div>

      <div className="card set-card">
        <h2 className="set-h"><Trash2 size={17} /> Data &amp; storage</h2>
        <p className="set-p">To save space, chat from finished quests is removed after a while, and abandoned (never-paid) checkouts are cleared out. Your quests, payments, payout history, and proof photos are always kept.</p>
        <label className="field"><span className="field-label">Keep chat for (days after a quest finishes)</span>
          <input className="field-input" type="number" min="0" step="1" value={f.messageRetentionDays} onChange={e => num("messageRetentionDays", e.target.value)} /></label>
        <p className="set-p" style={{ marginTop: "-2px" }}>0 = remove chat as soon as a quest is completed, canceled, or expired. This number is saved with your settings below, and the optional nightly auto-cleanup uses it too.</p>
        <Btn variant="ghost" icon={Trash2} onClick={runCleanup} disabled={cleaning} sound="click">{cleaning ? "Cleaning…" : "Run cleanup now"}</Btn>
      </div>

      <Btn full size="lg" icon={Check} onClick={save} disabled={busy} sound="success">{busy ? "Saving…" : "Save platform settings"}</Btn>
      <p className="pay-note">Only your admin account can change these. Limits and commission are also enforced on the server, so they can't be bypassed.</p>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [phase, setPhase] = useState("loading");
  const [jobs, setJobs] = useState([]);
  const [user, setUser] = useState(null);
  const [view, setView] = useState("browse");
  const [now, setNow] = useState(Date.now());
  const [ui, setUi] = useState({ stim: "high", soundOn: true });
  const [toasts, setToasts] = useState([]);
  const [confetti, setConfetti] = useState(0);
  const [focusJob, setFocusJob] = useState(null);
  const [msgNotifs, setMsgNotifs] = useState([]);
  const [platform, setPlatform] = useState(DEFAULT_PLATFORM);
  const [supportUnread, setSupportUnread] = useState(0);

  const reduceMotion = useRef(false);
  useEffect(() => {
    try { reduceMotion.current = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}
  }, []);
  const effStim = reduceMotion.current ? "low" : ui.stim;

  // clock
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
  // audio sync
  useEffect(() => { AUDIO.on = ui.soundOn; AUDIO.vol = ui.stim === "high" ? 1 : 0.5; }, [ui]);

  const toast = (msg, type = "info") => {
    const id = genId();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  };
  const celebrate = big => { play(big ? "levelup" : "success"); if (effStim === "high") setConfetti(c => c + 1); };

  function applyUserUi(u) {
    const st = u.settings || {};
    setUi({ stim: st.stim || "high", soundOn: st.soundOn !== false });
  }
  function enter(u) {
    setUser(u); applyUserUi(u);
    setView(u.type === "client" ? "post" : "browse");
    setPhase("app");
    play("claim");
  }
  // Ensure a profile exists, load the board, then drop into the app.
  async function loadAndEnter(authUser, meta = {}) {
    const { profile, error } = await dbEnsureProfile(authUser, meta);
    if (error || !profile) {
      toast(friendly(error) || "Couldn't load your profile. Try again.", "error");
      setPhase("auth");
      return false;
    }
    const res = await dbFetchJobs();
    setJobs(res.jobs);
    refreshPlatform();
    enter(profile);
    return true;
  }
  // Platform-wide settings (commission, caps, banner…). Everyone reads them;
  // only admins can save (enforced by RLS + DB triggers, not just here).
  async function refreshPlatform() {
    try {
      const { data } = await supabase.from("app_settings").select("*").limit(1).maybeSingle();
      if (data) setPlatform(rowToPlatform(data));
    } catch (e) { /* keep defaults */ }
  }
  async function savePlatform(patch) {
    const { error } = await supabase.from("app_settings").update(platformPatchToRow(patch)).eq("singleton", true);
    if (error) { toast(error.message || "Couldn't save — are you the admin?", "error"); return false; }
    await refreshPlatform();
    toast("Platform settings saved.", "success");
    return true;
  }

  // Permanently delete the signed-in user's own account (server refunds any held
  // money + frees their in-progress work first). Throws on error so the caller
  // can show it; on success we clear the local session.
  async function deleteAccount() {
    await callFn("delete-account", {});
    try { await supabase.auth.signOut(); } catch (e) {}
    setUser(null); setJobs([]); setMsgNotifs([]); setView("browse"); setPhase("auth");
  }

  // Admin-only (enforced server-side): grant or revoke admin for someone by email.
  async function setUserAdmin(email, makeAdmin) {
    const { data, error } = await supabase.rpc("set_user_admin", { target_email: email, make_admin: makeAdmin });
    if (error) throw new Error(error.message || "Couldn't update admin access.");
    return data;
  }
  async function listAdmins() {
    const { data, error } = await supabase.rpc("list_admins");
    if (error) throw new Error(error.message || "Couldn't load admins.");
    return data || [];
  }

  // City scoreboard: top earners in the caller's city (empty if no city set).
  async function cityLeaderboard() {
    const { data, error } = await supabase.rpc("city_leaderboard", { max_rows: 100 });
    if (error) throw new Error(error.message || "Couldn't load the scoreboard.");
    return data || [];
  }

  // Unread support badge: for an admin it's unread user messages across all
  // threads; for a user it's unread admin replies in their own thread.
  async function refreshSupportUnread(u) {
    const me = u || user;
    if (!me) return;
    try {
      let qy = supabase.from("support_messages").select("id", { count: "exact", head: true });
      qy = me.isAdmin
        ? qy.eq("sender", "user").eq("read_by_admin", false)
        : qy.eq("user_id", me.id).eq("sender", "admin").eq("read_by_user", false);
      const { count } = await qy;
      setSupportUnread(count || 0);
    } catch (e) { /* ignore */ }
  }

  // bootstrap: not configured -> setup screen; otherwise restore any saved session
  useEffect(() => {
    let sub = null;
    (async () => {
      if (!CONFIGURED) { setPhase("config"); return; }
      const { data } = await supabase.auth.getSession();
      const session = data ? data.session : null;
      if (session && session.user) await loadAndEnter(session.user);
      else setPhase("auth");
      const listener = supabase.auth.onAuthStateChange((event) => {
        if (event === "SIGNED_OUT") {
          setUser(null); setJobs([]);
          setUi({ stim: "high", soundOn: true });
          setPhase("auth");
        }
      });
      sub = listener.data ? listener.data.subscription : null;
    })();
    return () => { try { sub && sub.unsubscribe(); } catch (e) {} };
    /* eslint-disable-next-line */
  }, []);

  // live board sync (optional — schema.sql enables Realtime for `jobs`)
  useEffect(() => {
    if (!CONFIGURED || phase !== "app" || !ENABLE_REALTIME) return;
    const channel = supabase
      .channel("public:jobs")
      .on("postgres_changes", { event: "*", schema: "public", table: "jobs" }, () => { reloadJobs(); })
      .subscribe();
    return () => { try { supabase.removeChannel(channel); } catch (e) {} };
    /* eslint-disable-next-line */
  }, [phase]);

  // Deadline guarantee: when the app opens (and every few minutes while it's
  // open), refund any of this user's quests that passed their deadline unfinished.
  // The server marks them 'expired' and Stripe refunds the client.
  useEffect(() => {
    if (!CONFIGURED || phase !== "app" || !user || !PAYMENTS_ENABLED) return;
    let stop = false;
    const run = async () => {
      const r = await checkExpiredRefunds();
      if (!stop && r && r.refunded > 0) reloadJobs();
    };
    run();
    const t = setInterval(run, 5 * 60 * 1000);
    return () => { stop = true; clearInterval(t); };
    /* eslint-disable-next-line */
  }, [phase, user && user.id]);

  /* ---- auth actions (Supabase Auth) ---- */
  async function signup({ name, email, password, type }) {
    try {
      const { data: open } = await supabase.rpc("signups_open");
      if (open === false) return { ok: false, error: "Signups are closed right now. Please check back later." };
    } catch (e) { /* if the check fails, fall through — the DB still enforces it */ }
    const { data, error } = await supabase.auth.signUp({
      email, password, options: { data: { name, type } },
    });
    if (error) return { ok: false, error: friendly(error) };
    if (!data.session) {
      return { ok: false, error: "Almost there — check your email to confirm, then log in. (Or turn off “Confirm email” in Supabase to skip this.)" };
    }
    const ok = await loadAndEnter(data.user, { name, type });
    return ok ? { ok: true } : { ok: false, error: "Couldn't finish setting up your account. Try again." };
  }
  async function login({ email, password }) {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return { ok: false, error: friendly(error) };
    const ok = await loadAndEnter(data.user);
    return ok ? { ok: true } : { ok: false, error: "Couldn't load your account. Try again." };
  }
  // Demo accounts self-provision on first use (requires “Confirm email” OFF).
  async function demoLogin(which) {
    const acct = which === "client" ? DEMO_CLIENT : DEMO_WORKER;
    const type = which === "client" ? "client" : "worker";
    const res = await supabase.auth.signInWithPassword({ email: acct.email, password: DEMO_PASSWORD });
    if (!res.error) {
      const ok = await loadAndEnter(res.data.user);
      return ok ? { ok: true } : { ok: false, error: "Couldn't load the demo account. Try again." };
    }
    const up = await supabase.auth.signUp({
      email: acct.email, password: DEMO_PASSWORD, options: { data: { name: acct.name, type } },
    });
    if (up.error) return { ok: false, error: friendly(up.error) };
    if (!up.data.session) {
      return { ok: false, error: "Demo needs “Confirm email” turned OFF in Supabase (Authentication → Providers → Email)." };
    }
    const ok = await loadAndEnter(up.data.user, { name: acct.name, type });
    return ok ? { ok: true } : { ok: false, error: "Couldn't load the demo account. Try again." };
  }
  async function logout() {
    play("toggle");
    setUser(null); setJobs([]);
    setUi({ stim: "high", soundOn: true });
    setPhase("auth");
    try { await supabase.auth.signOut(); } catch (e) {}
  }

  /* ---- profile updates (optimistic local, persisted to Postgres) ---- */
  function updateUser(patch) {
    const id = user && user.id;
    setUser(cu => (cu ? { ...cu, ...patch } : cu));
    if (id) dbUpdateProfile(id, patch).then(({ error }) => {
      if (error) toast("Couldn't save that change.", "error");
    });
  }
  function saveSettings(patch, newName) {
    const merged = { ...(user.settings || {}), ...patch };
    const up = { settings: merged };
    if (newName) up.name = newName;
    updateUser(up);
    if (patch.stim !== undefined || patch.soundOn !== undefined) setUi({ stim: merged.stim, soundOn: merged.soundOn });
    if (patch.stim || patch.soundOn !== undefined || newName) toast("Settings saved.", "info");
  }
  function setEnergy(e) { saveSettings({ energy: e }); }
  function switchMode(type) {
    if (!user || (type !== "client" && type !== "worker") || user.type === type) return;
    updateUser({ type });
    setView(type === "client" ? "post" : "browse");
    play("pop");
    toast(type === "client" ? "You're in Client mode — post & manage quests." : "You're in Quester mode — browse & earn.", "success");
  }
  function pushNote(title, body) {
    if (user && user.settings && user.settings.push) deviceNotify(title, body);
  }
  useEffect(() => {
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
  }, []);

  // keep ui (nav toggles) in sync to the saved profile when logged in
  useEffect(() => {
    if (!user) return;
    const st = user.settings || {};
    if (st.stim !== ui.stim || (st.soundOn !== false) !== ui.soundOn) {
      updateUser({ settings: { ...st, stim: ui.stim, soundOn: ui.soundOn } });
    }
    /* eslint-disable-next-line */
  }, [ui]);

  /* ---- job actions (optimistic local, persisted to Postgres) ---- */
  async function reloadJobs() {
    const res = await dbFetchJobs();
    if (!res.error) setJobs(res.jobs);
  }
  async function postJob(data) {
    // Payments on: create a Stripe Checkout session via the edge function and
    // redirect. The job is created server-side as 'pending_payment' and flips
    // to 'open' when the Stripe webhook confirms the charge.
    if (PAYMENTS_ENABLED) {
      try {
        const origin = window.location.origin + window.location.pathname;
        const { url } = await callFn("stripe-checkout", {
          job: {
            title: data.title, category: data.category, desc: data.desc || "",
            location: data.location || "", effort: data.effort, estTime: data.estTime || "",
            payout: data.payout, deadline: data.deadline,
            lat: data.lat != null ? data.lat : null,
            lng: data.lng != null ? data.lng : null,
          },
          feePct: PLATFORM_FEE_PCT,
          successUrl: origin + "?paid=1",
          cancelUrl: origin + "?canceled=1",
        });
        if (url) { window.location.href = url; return false; } // redirecting away
        toast("Couldn't start checkout. Try again.", "error");
        return false;
      } catch (e) {
        toast(e.message || "Payment setup failed — is the edge function deployed?", "error");
        return false;
      }
    }
    // Payments off: insert directly (handy while setting Stripe up).
    const row = {
      status: "open",
      title: data.title, category: data.category, description: data.desc || "",
      location: data.location || "", effort: data.effort, est_time: data.estTime || "",
      payout: data.payout, deadline: data.deadline, created_at: Date.now(),
      posted_by: user.id, posted_by_name: user.name,
      claimed_by: null, claimed_by_name: null,
      scheduled_time: null, steps: [], completed_at: null,
      latitude: data.lat != null ? data.lat : null,
      longitude: data.lng != null ? data.lng : null,
    };
    const { job, error } = await dbInsertJob(row);
    if (error || !job) { toast("Couldn't post that quest — try again.", "error"); return false; }
    setJobs(prev => [job, ...prev]);
    // Alert nearby questers who opted into new-quest notifications.
    callFn("notify-job", { jobId: job.id, urgent: false }).catch(() => {});
    celebrate(false);
    return true;
  }
  async function deleteJob(id) {
    play("toggle");
    const snapshot = jobs;
    setJobs(prev => prev.filter(j => j.id !== id));
    const { error } = await dbDeleteJob(id);
    if (error) { setJobs(snapshot); toast("Couldn't remove that quest.", "error"); return; }
    toast("Quest removed.", "info");
  }
  // Client calls off a quest. Open → instant refund. Claimed/submitted → the
  // request goes to the quester to approve (in case they already did the work).
  async function cancelJob(id) {
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    play("toggle");
    try {
      const res = await callFn("cancel-job", { jobId: id });
      if (res && res.canceled) {
        setJobs(prev => prev.map(j => j.id === id ? { ...j, status: "canceled", refundedAt: Date.now(), cancelRequested: false } : j));
        toast(PAYMENTS_ENABLED ? `Quest canceled — ${money(job.payout)} refunded to your card.` : "Quest canceled.", "success");
      } else if (res && res.requested) {
        setJobs(prev => prev.map(j => j.id === id ? { ...j, cancelRequested: true } : j));
        toast("Cancellation request sent to your quester.", "info");
        sendPush(job.claimedBy, "Cancellation requested", `The client asked to cancel “${job.title}”.`);
      }
      reloadJobs();
    } catch (e) { toast(e.message || "Couldn't cancel that quest.", "error"); }
  }
  // Quester agrees to the client's cancellation → client is refunded.
  async function approveCancellation(id) {
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    play("toggle");
    try {
      const res = await callFn("cancel-job", { jobId: id, action: "approve" });
      if (res && res.canceled) {
        setJobs(prev => prev.map(j => j.id === id ? { ...j, status: "canceled", cancelRequested: false } : j));
        toast("Cancellation approved — the client was refunded.", "success");
        sendPush(job.postedBy, "Cancellation approved", `“${job.title}” was canceled and you were refunded.`);
      }
      reloadJobs();
    } catch (e) { toast(e.message || "Couldn't approve that.", "error"); }
  }
  // Quester keeps the quest (e.g. they've done/are doing the work).
  async function declineCancellation(id) {
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    play("toggle");
    try {
      await callFn("cancel-job", { jobId: id, action: "decline" });
      setJobs(prev => prev.map(j => j.id === id ? { ...j, cancelRequested: false } : j));
      toast("Kept the quest — finish up and submit your proof.", "info");
      sendPush(job.postedBy, "Quester is keeping the quest", `Your quester is finishing “${job.title}” rather than canceling.`);
      reloadJobs();
    } catch (e) { toast(e.message || "Couldn't update that.", "error"); }
  }
  async function claimJob(id, scheduledTime) {
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    if (job.deadline <= Date.now()) { toast("That quest's deadline just passed — it'll be refunded to the client.", "info"); reloadJobs(); return; }
    const patch = {
      status: "claimed", claimedBy: user.id, claimedByName: user.name,
      scheduledTime, steps: stepsFor(job.category),
    };
    const { claimed, error } = await dbClaimJob(id, patch);
    if (error) { toast("Couldn't claim that one — try again.", "error"); return; }
    if (!claimed) { toast("Someone just grabbed that quest. 💨", "info"); reloadJobs(); return; }
    setJobs(prev => prev.map(j => (j.id === id ? { ...j, ...patch } : j)));
    celebrate(false); toast("Claimed! It's in your tasks. 🎯", "success");
    sendPush(job.postedBy, "Quest claimed", `${user.name} claimed “${job.title}”.`);
    setView("tasks");
  }
  async function setSteps(id, steps) {
    setJobs(prev => prev.map(j => (j.id === id ? { ...j, steps } : j)));
    const { error } = await dbUpdateJob(id, { steps });
    if (error) toast("Couldn't save your steps.", "error");
  }
  // Worker submits finished work (with photos) for the client to review.
  async function submitJob(id, images) {
    const job = jobs.find(j => j.id === id);
    if (!job) return false;
    const submittedAt = Date.now();
    const patch = { status: "submitted", proofImages: images || [], submittedAt, reviewNote: "" };
    setJobs(prev => prev.map(j => (j.id === id ? { ...j, ...patch } : j)));
    const { error } = await dbUpdateJob(id, patch);
    if (error) { toast("Couldn't submit — try again.", "error"); reloadJobs(); return false; }
    celebrate(false);
    toast("Submitted for review! The client will take a look. 📸", "success");
    sendPush(job.postedBy, "Work submitted for review", `“${job.title}” is ready for you to review.`);
    setView("tasks");
    return true;
  }
  // Client approves the work → quest completes → the worker is credited
  // server-side by the approval trigger in schema.sql (the client can't write
  // the worker's profile directly, so the database does it on completion).
  async function approveJob(id) {
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    const completedAt = Date.now();
    const patch = { status: "completed", completedAt };
    setJobs(prev => prev.map(j => (j.id === id ? { ...j, ...patch } : j)));
    const { error } = await dbUpdateJob(id, patch);
    if (error) { toast("Couldn't approve — try again.", "error"); reloadJobs(); return; }
    celebrate(true);
    const net = questerNet(job.payout, platform.commissionPct);
    toast(`Approved! Payment released to ${job.claimedByName || "your quester"}. 🎉`, "success");
    sendPush(job.claimedBy, "Work approved 🎉", `“${job.title}” was approved — ${money(net)} is yours.`);
  }
  // Client sends the work back with notes; quest returns to the worker.
  async function requestChanges(id, noteText) {
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    const patch = { status: "claimed", reviewNote: (noteText || "").trim() };
    setJobs(prev => prev.map(j => (j.id === id ? { ...j, ...patch } : j)));
    const { error } = await dbUpdateJob(id, patch);
    if (error) { toast("Couldn't send it back — try again.", "error"); reloadJobs(); return; }
    play("toggle");
    toast("Sent back with your notes.", "info");
    sendPush(job.claimedBy, "Changes requested", `“${job.title}” needs a few tweaks before approval.`);
  }
  function refreshJobs() { (async () => { await reloadJobs(); toast("Board refreshed.", "info"); })(); }

  // Worker gives up / can't finish a claimed quest — back to the board, with a note.
  async function releaseJob(id, opts) {
    const o = opts || {};
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    // Notify the poster *before* we clear the claim, so the push guard still
    // sees the worker↔poster link on the quest.
    sendPush(job.postedBy, "Quest came back", `“${job.title}” was released — it's back on your board.`);
    const patch = {
      status: "open", claimedBy: null, claimedByName: "",
      scheduledTime: null, steps: [],
      releaseReason: o.reason || "", releaseNote: (o.note || "").trim(),
    };
    setJobs(prev => prev.map(j => (j.id === id ? { ...j, ...patch } : j)));
    const { error } = await dbUpdateJob(id, patch);
    if (error) { toast("Couldn't release that quest — try again.", "error"); reloadJobs(); return; }
    play("toggle");
    // Urgent: alert questers in this city that a dropped quest needs covering.
    callFn("notify-job", { jobId: id, urgent: true }).catch(() => {});
    toast("Released back to the board. Take care of yourself. 💛", "info");
    setView("browse");
  }

  function setHomeLocation(lat, lng, city) {
    const patch = { homeLat: lat, homeLng: lng };
    if (city && city.trim()) patch.city = city.trim();
    updateUser(patch);
  }
  async function refreshProfile() {
    if (!user) return;
    const { profile } = await dbFetchProfile(user.id);
    if (profile) setUser(profile);
  }

  // Unread-message notifications: messages from the other party newer than the
  // last time this user opened their menu (tracked in localStorage). RLS limits
  // results to conversations the user is part of, so this is safe.
  const lastMsgTsRef = useRef(null);
  async function refreshMsgNotifs(u) {
    const id = (u || user) && (u || user).id;
    if (!id) return;
    let seen = 0;
    try {
      const raw = localStorage.getItem("sq_seen_" + id);
      if (raw == null) { seen = Date.now(); localStorage.setItem("sq_seen_" + id, String(seen)); }
      else seen = Number(raw) || 0;
    } catch (e) {}
    const { data } = await supabase.from("messages")
      .select("job_id, sender_name, created_at")
      .neq("sender_id", id).gt("created_at", seen)
      .order("created_at", { ascending: false }).limit(60);
    const rows = data || [];
    const map = new Map();
    rows.forEach(m => {
      const e = map.get(m.job_id) || { jobId: m.job_id, name: m.sender_name, count: 0 };
      e.count++; map.set(m.job_id, e);
    });
    setMsgNotifs(Array.from(map.values()));
    // Track the newest seen message; the device notification for new messages
    // is delivered by the server push (send-push), shown by the service worker.
    const newest = rows.reduce((mx, m) => Math.max(mx, Number(m.created_at) || 0), 0);
    const prevTs = lastMsgTsRef.current;
    if (prevTs == null) { lastMsgTsRef.current = newest; }
    else if (newest > prevTs) { lastMsgTsRef.current = newest; }
  }
  function markMsgsSeen() {
    if (!user) return;
    try { localStorage.setItem("sq_seen_" + user.id, String(Date.now())); } catch (e) {}
    setMsgNotifs([]);
  }
  useEffect(() => {
    if (phase !== "app" || !user) return;
    refreshMsgNotifs();
    const t = setInterval(() => refreshMsgNotifs(), 60000);
    return () => clearInterval(t);
    /* eslint-disable-next-line */
  }, [phase, user && user.id]);

  // Support help-desk unread badge: poll + live updates.
  useEffect(() => {
    if (phase !== "app" || !user) return;
    refreshSupportUnread();
    const t = setInterval(() => refreshSupportUnread(), 60000);
    let ch = null;
    if (CONFIGURED && ENABLE_REALTIME) {
      ch = supabase.channel("support-badge-" + user.id)
        .on("postgres_changes", { event: "*", schema: "public", table: "support_messages" }, () => refreshSupportUnread())
        .subscribe();
    }
    return () => { clearInterval(t); if (ch) { try { supabase.removeChannel(ch); } catch (e) {} } };
    /* eslint-disable-next-line */
  }, [phase, user && user.id]);

  // ADHD reminders for questers: nudge before a claimed quest starts, and before
  // its deadline. Shows a toast (when the app is in view) and a system
  // notification (when it's backgrounded). Each reminder fires once, tracked in
  // localStorage. For reminders when the app is fully CLOSED, deploy the
  // optional send-reminders function (see schema.sql).
  useEffect(() => {
    if (phase !== "app" || !user || user.type !== "worker") return;
    const key = "sq_rem_" + user.id;
    const loadFired = () => { try { return new Set(JSON.parse(localStorage.getItem(key) || "[]")); } catch (e) { return new Set(); } };
    const saveFired = set => { try { localStorage.setItem(key, JSON.stringify(Array.from(set).slice(-300))); } catch (e) {} };
    function check() {
      const s = user.settings || {};
      const now = Date.now();
      const fired = loadFired();
      let changed = false;
      jobs.filter(j => j.claimedBy === user.id && j.status === "claimed").forEach(j => {
        if (s.remindStart !== false && j.scheduledTime) {
          const lead = Math.max(5, Math.min(240, Number(s.remindStartMin) || 30)) * 60000;
          const k = "s_" + j.id;
          if (!fired.has(k) && now >= j.scheduledTime - lead && now <= j.scheduledTime + 60000) {
            fired.add(k); changed = true;
            const mins = Math.max(1, Math.round((j.scheduledTime - now) / 60000));
            const msg = now >= j.scheduledTime ? `“${j.title}” is starting now.` : `“${j.title}” starts in about ${mins} min.`;
            toast("⏰ " + msg, "info");
            deviceNotify("Quest starting soon ⏰", msg, { tag: "start-" + j.id });
          }
        }
        if (s.remindDeadline !== false && j.deadline) {
          const lead = Math.max(15, Math.min(1440, Number(s.remindDeadlineMin) || 120)) * 60000;
          const k = "d_" + j.id;
          if (!fired.has(k) && now >= j.deadline - lead && now <= j.deadline) {
            fired.add(k); changed = true;
            const mins = Math.max(1, Math.round((j.deadline - now) / 60000));
            const human = mins >= 60 ? "about " + Math.round(mins / 60) + " hr" : "about " + mins + " min";
            const msg = `“${j.title}” is due in ${human}.`;
            toast("⌛ " + msg, "info");
            deviceNotify("Deadline coming up ⌛", msg, { tag: "dl-" + j.id });
          }
        }
      });
      if (changed) saveFired(fired);
    }
    check();
    const t = setInterval(check, 60000);
    return () => clearInterval(t);
    /* eslint-disable-next-line */
  }, [phase, user && user.id, jobs]);

  // Handle returns from Stripe Checkout / Connect onboarding (query flags).
  useEffect(() => {
    if (phase !== "app") return;
    const p = new URLSearchParams(window.location.search);
    let changed = false;
    if (p.get("paid") === "1") { toast("Payment received — your quest is live! 🎉", "success"); reloadJobs(); changed = true; }
    if (p.get("canceled") === "1") { toast("Checkout canceled — quest wasn't posted.", "info"); changed = true; }
    if (p.get("connect") === "done") { toast("Payouts connected — you can cash out now.", "success"); refreshProfile(); changed = true; }
    if (p.get("connect") === "refresh") { toast("Almost there — finish your payout setup.", "info"); changed = true; }
    if (changed) {
      try { window.history.replaceState({}, "", window.location.origin + window.location.pathname); } catch (e) {}
    }
    /* eslint-disable-next-line */
  }, [phase]);

  // Apply the user's chosen accent color (or default crimson) across the app.
  useEffect(() => {
    applyTheme(user && user.settings ? user.settings.themeColor : null);
  }, [user && user.settings ? user.settings.themeColor : null]);

  // Live notifications: toast on quest status transitions, and refresh the
  // worker's stats when their submitted work is approved (credited server-side).
  const prevJobsRef = useRef(null);
  useEffect(() => {
    const prev = prevJobsRef.current;
    prevJobsRef.current = jobs;
    if (!prev || !user) return;
    const byId = new Map(prev.map(j => [j.id, j]));
    jobs.forEach(j => {
      const p = byId.get(j.id);
      if (!p || p.status === j.status) return;
      if (j.claimedBy === user.id && j.status === "completed" && p.status !== "completed") {
        refreshProfile(); celebrate(true);
        toast(`Your work on “${j.title}” was approved! 🎉`, "success");
      } else if (j.claimedBy === user.id && j.status === "claimed" && p.status === "submitted") {
        toast(`“${j.title}” needs a few changes — check your tasks.`, "info");
      } else if (j.postedBy === user.id && j.status === "submitted" && p.status !== "submitted") {
        toast(`“${j.title}” was submitted — ready for your review.`, "info");
      } else if (j.postedBy === user.id && j.status === "claimed" && p.status === "open") {
        toast(`${j.claimedByName || "Someone"} claimed “${j.title}”.`, "info");
      } else if (j.postedBy === user.id && j.status === "open" && p.status === "claimed") {
        toast(`“${j.title}” came back — your quester couldn't finish it.`, "info");
      } else if (j.postedBy === user.id && j.status === "expired" && p.status !== "expired") {
        toast(`Deadline passed on “${j.title}” — ${money(j.payout)} refunded to your card. 🛡️`, "info");
      } else if (j.claimedBy === user.id && j.status === "expired" && p.status !== "expired") {
        toast(`“${j.title}” expired before it was finished — it's closed out.`, "info");
      }
    });
    /* eslint-disable-next-line */
  }, [jobs]);

  const value = {
    user, jobs, view, setView, now, ui, setUi,
    signup, login, demoLogin, logout, postJob, deleteJob, claimJob, setSteps,
    submitJob, approveJob, requestChanges,
    saveSettings, setEnergy, toast, refreshJobs, setFocusJob,
    setHomeLocation, refreshProfile, releaseJob, switchMode,
    msgNotifs, refreshMsgNotifs, markMsgsSeen,
    cancelJob, approveCancellation, declineCancellation,
    platform, savePlatform, refreshPlatform,
    deleteAccount, setUserAdmin, listAdmins, cityLeaderboard,
    supportUnread, refreshSupportUnread,
  };

  return (
    <Ctx.Provider value={value}>
      <style>{CSS}</style>
      <div className={`app stim-${effStim}`} onPointerDown={() => ctx()}>
        {effStim === "high" && <Blobs />}
        <ConfettiLayer trigger={confetti} />
        <Toasts items={toasts} />
        {focusJob && <FocusOverlay job={focusJob} onClose={() => setFocusJob(null)} />}

        {phase === "loading" && (
          <div className="loading">
            <span className="brand-mark spin"><Flame size={22} strokeWidth={2.6} /></span>
            <p>Loading your quests…</p>
          </div>
        )}
        {phase === "config" && <ConfigScreen />}
        {phase === "auth" && <AuthScreen />}
        {phase === "app" && user && (
          <>
            <Nav />
            {platform.announcement ? (
              <div className="announce-bar"><Bell size={14} strokeWidth={2.6} /><span>{platform.announcement}</span></div>
            ) : null}
            <main className="main">
              {view === "admin" && user.isAdmin ? (
                <AdminScreen />
              ) : view === "support" ? (
                <SupportScreen />
              ) : view === "schedule" ? (
                <ScheduleScreen />
              ) : (
                <>
                  {user.type === "client" ? <ClientHome /> : <WorkerHome />}
                  {view === "settings" && <SettingsScreen />}
                </>
              )}
            </main>
          </>
        )}
      </div>
    </Ctx.Provider>
  );
}

/* ============================================================
   STYLES
   ============================================================ */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap');

:root{
  --bg:#0A0507; --bg2:#160A0E; --void:#050203; --ink:#F7E9EC; --ink2:#C79AA3; --muted:#8C5C66;
  --card:#130A0D; --card2:#1B0E12; --line:#2C141A; --line2:#3D1A23;
  --p-rgb:230,23,58; --a-rgb:255,77,109;
  --primary:rgb(var(--p-rgb)); --primary-d:#B40E2C; --primary-l:#250C12;
  --accent:rgb(var(--a-rgb)); --accent-l:#2E0F16;
  --ember:#FF6B2C;
  --pglow:rgba(var(--p-rgb),.55);
  --bgtint1:rgba(var(--p-rgb),.20); --bgtint2:rgba(var(--a-rgb),.13); --seltint:rgba(var(--p-rgb),.40);
  --gold:#FFC24B; --gold-l:#2A1E0A;
  --mint:#23E89B; --mint-l:#08251A;
  --cyan:#2BD6EE; --cyan-l:#06222A;
  --r:18px; --r-lg:24px; --r-sm:12px;
  --sh:0 24px 60px -24px rgba(0,0,0,.9);
  --sh-sm:0 12px 30px -16px rgba(0,0,0,.85);
  --glow:0 0 30px -4px var(--pglow);
  --font:'Plus Jakarta Sans',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --disp:'Chakra Petch','Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
  --mono:'Space Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
::selection{background:var(--seltint);color:#fff}
.app{font-family:var(--font);color:var(--ink);min-height:100vh;background:
  radial-gradient(900px 520px at 84% -10%, var(--bgtint1), transparent 60%),
  radial-gradient(820px 620px at -10% 110%, var(--bgtint2), transparent 55%),
  radial-gradient(1200px 900px at 50% 40%, transparent, rgba(5,2,3,.55) 92%),
  var(--bg);position:relative;overflow-x:hidden}
.app::before{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.016) 0,rgba(255,255,255,.016) 1px,transparent 1px,transparent 3px);
  mix-blend-mode:overlay;opacity:.6}
.app::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;
  box-shadow:inset 0 0 240px 50px rgba(0,0,0,.72)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:var(--ink)}
input::placeholder,textarea::placeholder{color:#7a4a54}
em{font-style:normal;color:var(--primary)}
.spin{animation:spin 1.1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* scrollbar */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:linear-gradient(var(--primary-d),#5e0816);border-radius:99px;border:2px solid var(--bg)}
*::-webkit-scrollbar-thumb:hover{background:var(--primary)}

/* ambient ember glows */
.blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.45}
.b1{width:460px;height:460px;background:radial-gradient(circle,var(--primary) 0%,transparent 68%);top:-150px;left:-90px;animation:float1 19s ease-in-out infinite}
.b2{width:380px;height:380px;background:radial-gradient(circle,var(--accent) 0%,transparent 68%);bottom:-140px;right:-70px;animation:float2 23s ease-in-out infinite}
.b3{width:340px;height:340px;background:radial-gradient(circle,#7C0A1E 0%,transparent 70%);top:38%;right:16%;animation:float1 27s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.08)}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,30px) scale(1.05)}}

/* rising embers */
.sparks{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.spark{position:absolute;bottom:-12px;border-radius:50%;opacity:0;animation:ember linear infinite;will-change:transform,opacity}
@keyframes ember{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:.95}72%{opacity:.7}100%{transform:translateY(-105vh) translateX(28px);opacity:0}}

/* confetti */
.confetti-layer{position:fixed;inset:0;z-index:80;pointer-events:none;overflow:hidden}
.confetti-piece{position:absolute;top:-20px;border-radius:2px;animation:fall linear forwards;will-change:transform;box-shadow:0 0 8px rgba(var(--p-rgb),.4)}
@keyframes fall{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--drift),104vh) rotate(var(--rot));opacity:.9}}

/* toasts */
.toasts{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:10px;align-items:center;width:max-content;max-width:92vw}
.toast{display:flex;align-items:center;gap:10px;background:#1B0E12;color:#fff;padding:12px 18px;border-radius:14px;font-weight:600;font-size:14.5px;border:1px solid var(--line2);box-shadow:var(--sh),var(--glow);animation:toastIn .35s cubic-bezier(.2,1.3,.4,1)}
.toast-success{background:linear-gradient(120deg,#0c2a1f,#103b2b);border-color:#1c5e44;box-shadow:var(--sh),0 0 26px -6px rgba(35,232,155,.5)}
.toast-success svg{color:var(--mint)}
.toast-level{background:linear-gradient(120deg,#2a0e14,#3a0d18);border-color:var(--primary-d);box-shadow:var(--sh),var(--glow)}
.toast-level svg{color:var(--gold)}
.toast-error{background:linear-gradient(120deg,#2e0f16,#3a0d18);border-color:#7a1228}
.toast-error svg{color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

/* loading */
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;color:var(--ink2);position:relative;z-index:2}
.loading p{font-weight:600;letter-spacing:.04em;font-family:var(--disp)}

/* brand */
.brand{font-family:var(--disp);font-weight:700;font-size:20px;letter-spacing:.01em;display:flex;align-items:center;gap:9px}
.brand-lg{font-size:27px}
.brand-mark{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;box-shadow:0 8px 22px -6px var(--pglow);animation:markpulse 2.8s ease-in-out infinite}
@keyframes markpulse{0%,100%{box-shadow:0 8px 22px -6px var(--pglow)}50%{box-shadow:0 0 24px 2px var(--pglow),0 8px 22px -6px var(--pglow)}}
.brand-lg .brand-mark{width:44px;height:44px;border-radius:13px}

/* buttons */
.btn{position:relative;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;border-radius:13px;transition:transform .09s cubic-bezier(.2,1.3,.4,1),box-shadow .2s,background .2s,filter .2s;white-space:nowrap;letter-spacing:.01em;font-family:var(--disp)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px}
.btn-md{padding:11px 18px;font-size:14px}
.btn-lg{padding:14px 22px;font-size:15px;border-radius:14px}
.btn-full{width:100%}
.btn:active{transform:translateY(1px) scale(.985)}
.btn-primary{background:linear-gradient(120deg,var(--primary),var(--accent));color:#fff;box-shadow:0 12px 30px -12px rgba(var(--p-rgb),.9),0 0 0 1px rgba(255,120,140,.25) inset}
.btn-primary:hover{filter:brightness(1.08);box-shadow:0 16px 38px -12px rgba(var(--p-rgb),1),0 0 24px -6px var(--pglow)}
.btn-primary::before{content:"";position:absolute;top:0;left:-60%;width:38%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-20deg)}
.btn-primary:hover::before{animation:sheen .7s ease}
@keyframes sheen{from{left:-60%}to{left:140%}}
.btn-success{background:linear-gradient(120deg,#17b377,#23E89B);color:#06231a;box-shadow:0 12px 30px -12px rgba(35,232,155,.7)}
.btn-success:hover{filter:brightness(1.06);box-shadow:0 14px 34px -12px rgba(35,232,155,.85),0 0 22px -6px rgba(35,232,155,.6)}
.btn-soft{background:var(--primary-l);color:#ff8ea0;border:1px solid var(--line2)}
.btn-soft:hover{background:#34101a;border-color:var(--primary-d)}
.btn-ghost{background:rgba(255,255,255,.02);color:var(--ink);border:1.5px solid var(--line2)}
.btn-ghost:hover{border-color:var(--primary);color:#fff;box-shadow:0 0 18px -8px var(--pglow)}
.btn-ghostdanger{background:rgba(255,255,255,.02);color:var(--accent);border:1.5px solid var(--line2)}
.btn-ghostdanger:hover{background:var(--accent-l);border-color:var(--accent)}
.btn:disabled{opacity:.55;cursor:default;filter:none!important}

.iconbtn{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.02);border:1.5px solid var(--line2);display:grid;place-items:center;color:var(--ink2);transition:.18s}
.iconbtn:hover{color:#fff;border-color:var(--primary);box-shadow:0 0 16px -8px var(--pglow)}
.iconbtn-on{background:var(--primary-l);color:var(--primary);border-color:var(--primary-d)}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
.chips-scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.chips-scroll::-webkit-scrollbar{height:0}
