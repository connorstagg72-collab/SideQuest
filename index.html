/* ---------- friendly auth error text ---------- */
function friendly(error) {
  const m = (error && error.message ? error.message : "").toLowerCase();
  if (m.includes("invalid login")) return "That email or password doesn't match.";
  if (m.includes("already registered") || m.includes("already been registered"))
    return "An account already uses that email. Try logging in.";
  if (m.includes("password should") || m.includes("at least 6"))
    return "Password needs at least 6 characters.";
  if (m.includes("unable to validate email") || m.includes("invalid email"))
    return "Enter a valid email address.";
  if (m.includes("rate limit")) return "Too many attempts — wait a moment and try again.";
  return (error && error.message) || "Something went wrong. Try again.";
}

async function geocodeAddress(q) {
  if (!q || !q.trim()) return null;
  try {
    const res = await fetch(
      "https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=0&q=" +
        encodeURIComponent(q.trim()),
      { headers: { Accept: "application/json" } }
    );
    const arr = await res.json();
    if (arr && arr[0]) return { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon), label: arr[0].display_name };
  } catch (e) { console.error("geocode", e); }
  return null;
}
async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(
      "https://nominatim.openstreetmap.org/reverse?format=json&zoom=14&lat=" + lat + "&lon=" + lng,
      { headers: { Accept: "application/json" } }

    const j = await res.json();
    if (j && j.display_name) return j.display_name;
  } catch (e) {}
  return null;
}
function getCurrentPosition() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
      () => resolve(null),
      { enableHighAccuracy: false, timeout: 9000, maximumAge: 60000 }
    );
  });
}
function milesBetween(a, b) {
  if (!a || !b || a.lat == null || b.lat == null) return null;
  const R = 3958.8, toRad = (d) => (d * Math.PI) / 180;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

  if (mi < 10) return mi.toFixed(1) + " mi";

}

/* ---------- theme (accent color → dark palette) ---------- */
function hexToHue(hex) {
  let h = String(hex || "").replace("#", "");
  if (h.length === 3) h = h.split("").map(c => c + c).join("");
  const r = parseInt(h.slice(0, 2), 16) / 255, g = parseInt(h.slice(2, 4), 16) / 255, b = parseInt(h.slice(4, 6), 16) / 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
  let hue = 0;
  if (d !== 0) {
    if (mx === r) hue = ((g - b) / d) % 6;
    else if (mx === g) hue = (b - r) / d + 2;
    else hue = (r - g) / d + 4;
    hue = hue * 60; if (hue < 0) hue += 360;
  }
  return { hue, sat: mx === 0 ? 0 : d / mx };
}
// Pass a hex to theme the app; pass null/empty to restore the default crimson.
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return Math.round(255 * f(0)) + "," + Math.round(255 * f(8)) + "," + Math.round(255 * f(4));
}
function applyTheme(hex) {
  const root = document.documentElement.style;
  const keys = ["--p-rgb","--a-rgb","--primary-d","--primary-l","--accent-l","--ember",
    "--bg","--bg2","--void","--card","--card2","--line","--line2","--ink","--ink2","--muted"];
  if (!hex) { keys.forEach(k => root.removeProperty(k)); return; }
  const { hue, sat } = hexToHue(hex);
  const H = sat < 0.08 ? 222 : Math.round(hue);     // gray/white/black input → tasteful blue
  const H2 = (H + 14) % 360;
  const hsl = (s, l) => `hsl(${H}, ${s}%, ${l}%)`;
  // primary + accent flow through RGB triplets so every glow/tint follows along;
  // the rest are fixed shades of the same hue, kept dark + black-based.
  const set = {
    "--p-rgb": hslToRgb(H, 80, 52), "--a-rgb": hslToRgb(H, 100, 66),
    "--primary-d": hsl(82, 40), "--primary-l": hsl(48, 10),
    "--accent-l": hsl(45, 12), "--ember": `hsl(${H2}, 95%, 60%)`,
    "--bg": hsl(32, 4.5), "--bg2": hsl(36, 7.5), "--void": hsl(30, 2.5),
    "--card": hsl(30, 6), "--card2": hsl(30, 9.5), "--line": hsl(34, 14), "--line2": hsl(38, 19),
    "--ink": hsl(30, 95), "--ink2": hsl(26, 72), "--muted": hsl(22, 47),
  };
  Object.keys(set).forEach(k => root.setProperty(k, set[k]));
}

/* ---------- edge-function caller (Stripe logic lives server-side) ---------- */
async function callFn(name, body) {
  const { data } = await supabase.auth.getSession();
  const token = data && data.session ? data.session.access_token : null;
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + (token || SUPABASE_ANON_KEY),
      apikey: SUPABASE_ANON_KEY,
    },
    body: JSON.stringify(body || {}),
  });
  let json = null;
  try { json = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error((json && (json.error || json.message)) || "Request failed (" + res.status + ")");
  return json || {};
}

/* ---------- synthesized sound (Web Audio) ---------- */
let AC = null;
function ctx() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === "suspended") AC.resume();
  return AC;
}
function blip(freq, start, dur, type, gain) {
  const c = ctx(); if (!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(c.destination);
  const t = c.currentTime + start;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(Math.max(gain, 0.0002), t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}

const SPARKS = Array.from({ length: 16 }, (_, i) => ({
  id: i,
  left: Math.round((i * 6.1 + (i % 3) * 9) % 100),
  delay: (i * 0.7) % 9,
  dur: 7 + (i % 5) * 1.6,
  size: 2 + (i % 3),
  hue: i % 3 === 0 ? "var(--accent)" : i % 3 === 1 ? "var(--ember)" : "var(--primary)",

function Blobs() {

            left: s.left + "%", background: s.hue, width: s.size, height: s.size,
            animationDelay: s.delay + "s", animationDuration: s.dur + "s",
            boxShadow: "0 0 8px " + (s.hue),
          }} />
        ))}

function ConfettiLayer({ trigger }) {
  const [pieces, setPieces] = useState([]);
  useEffect(() => {
    if (!trigger) return;
    const cs = getComputedStyle(document.documentElement);
    const v = (name, fallback) => { const x = cs.getPropertyValue(name).trim(); return x || fallback; };
    const colors = [v("--primary", "#E6173A"), v("--accent", "#FF4D6D"), "#FFC24B", "#23E89B", v("--ember", "#FF6B2C")];
    const batch = Array.from({ length: 90 }, (_, i) => ({
      id: trigger + "-" + i + "-" + Math.random(),
      left: Math.random() * 100, bg: colors[i % colors.length],
      delay: Math.random() * 0.25, dur: 1.3 + Math.random() * 1.2,
      w: 6 + Math.random() * 8, h: 6 + Math.random() * 6,
      drift: (Math.random() - 0.5) * 260, rot: Math.random() * 720,
    }));
    setPieces(p => [...p, ...batch]);
    const t = setTimeout(() => setPieces(p => p.filter(x => !batch.some(b => b.id === x.id))), 2800);
    return () => clearTimeout(t);
  }, [trigger]);
  return (
    <div className="confetti-layer" aria-hidden="true">
      {pieces.map(p => (
        <span key={p.id} className="confetti-piece"
          style={{ left: p.left + "%", background: p.bg, width: p.w, height: p.h,
            animationDelay: p.delay + "s", animationDuration: p.dur + "s",
            "--drift": p.drift + "px", "--rot": p.rot + "deg" }} />
      ))}
    </div>
  );
}

}

/* ============================================================
   Focus Sprint overlay (body-doubling timer) — signature feature
   ============================================================ */
function FocusOverlay({ job, onClose }) {
  const [mins, setMins] = useState(15);
  const [elapsed, setElapsed] = useState(0);
  const [running, setRunning] = useState(false);
  const [line, setLine] = useState(FOCUS_LINES[0]);
  const total = mins * 60;
  const left = Math.max(0, total - elapsed);
  const progress = total ? elapsed / total : 0;
  const R = 96, C = 2 * Math.PI * R;

  useEffect(() => {
    if (!running) return;
    const t = setInterval(() => setElapsed(e => {
      const n = e + 1;
      if (n % 30 === 0) play("tick");
      if (n >= total) {
        clearInterval(t); setRunning(false); play("success");
        return total;
      }
      return n;
    }), 1000);
    return () => clearInterval(t);
  }, [running, total]);

  useEffect(() => {
    const t = setInterval(() => setLine(FOCUS_LINES[Math.floor(Math.random() * FOCUS_LINES.length)]), 9000);
    return () => clearInterval(t);
  }, []);

  const done = left === 0 && elapsed > 0;
  const mm = String(Math.floor(left / 60)).padStart(2, "0");
  const ss = String(left % 60).padStart(2, "0");

  return (
    <div className="overlay" onClick={onClose}>
      <div className="focus-card" onClick={e => e.stopPropagation()}>
        <button className="focus-x" onClick={() => { play("click"); onClose(); }} aria-label="Close focus sprint"><X size={20} /></button>
        <div className="focus-eyebrow"><Wind size={14} /> Focus sprint</div>
        <h3 className="focus-title">{job.title}</h3>

        <div className="ring-wrap">
          <svg width="232" height="232" viewBox="0 0 232 232" className="ring">
            <circle cx="116" cy="116" r={R} className="ring-track" />
            <circle cx="116" cy="116" r={R} className="ring-prog"
              style={{ strokeDasharray: C, strokeDashoffset: C * (1 - progress) }} />
          </svg>
          <div className="ring-center">
            <div className="ring-time">{done ? "Done!" : `${mm}:${ss}`}</div>
            <div className="ring-sub">{done ? "Sprint complete" : running ? "stay with it" : "ready when you are"}</div>
          </div>
        </div>

        {!running && !done && (
          <div className="focus-durs">
            {[5, 15, 25].map(m => (
              <button key={m} className={`dur ${mins === m ? "dur-on" : ""}`}
                onClick={() => { play("toggle"); setMins(m); setElapsed(0); }}>{m} min</button>
            ))}
          </div>
        )}

        <p className="focus-line">{done ? "Take a breath. You earned it." : line}</p>

        <div className="focus-actions">
          {!done && (
            <Btn variant={running ? "ghost" : "primary"} size="lg" icon={running ? Pause : Play}
              onClick={() => setRunning(r => !r)} sound="toggle">
              {running ? "Pause" : elapsed > 0 ? "Resume" : "Start sprint"}
            </Btn>
          )}
          {(elapsed > 0) && (
            <Btn variant="ghost" size="lg" icon={RefreshCw} onClick={() => { setElapsed(0); setRunning(false); }}>Reset</Btn>
          )}
          {done && <Btn variant="success" size="lg" icon={Check} onClick={() => { play("click"); onClose(); }}>Back to task</Btn>}
        </div>
      </div>
    </div>
  );
}

function PostQuestForm() {
  const { user, postJob, toast } = useApp();
  const [title, setTitle] = useState("");
  const [cat, setCat] = useState("Cleanup");
  const [desc, setDesc] = useState("");
  const [loc, setLoc] = useState("");
  const [coords, setCoords] = useState(null);
  const [locBusy, setLocBusy] = useState(false);
  const [effort, setEffort] = useState("Medium");
  const [est, setEst] = useState("");
  const [payout, setPayout] = useState(user.settings?.defaultPayout || 60);
  const [deadline, setDeadline] = useState(toLocalInput(Date.now() + 2 * DAY));
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const totalCharge = Math.max(0, Math.round(Number(payout || 0) * (1 + PLATFORM_FEE_PCT / 100)));

  async function useMyLocation() {
    setLocBusy(true);
    const p = await getCurrentPosition();
    if (!p) { setLocBusy(false); toast("Couldn't get your location — type an address instead.", "info"); return; }
    setCoords({ lat: p.lat, lng: p.lng });
    const label = await reverseGeocode(p.lat, p.lng);
    setLoc(label || `${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}`);
    setLocBusy(false);
  }

  async function submit() {
    if (busy) return;
    setErr("");
    if (!title.trim()) { play("error"); return setErr("Give the quest a clear title."); }
    if (Number(payout) <= 0) { play("error"); return setErr("Set a payout above $0."); }
    const dl = new Date(deadline).getTime();
    if (!dl || dl < Date.now()) { play("error"); return setErr("Pick a deadline in the future."); }

    // Resolve coordinates from the typed address if we don't have them yet.
    let lat = coords ? coords.lat : null, lng = coords ? coords.lng : null;
    const locText = loc.trim();
    if (locText && lat == null && !/^remote/i.test(locText)) {
      setLocBusy(true);
      const g = await geocodeAddress(locText);
      setLocBusy(false);
      if (g) { lat = g.lat; lng = g.lng; setCoords({ lat, lng }); }
    }

    setBusy(true);
    const ok = await postJob({
      title: title.trim(), category: cat, desc: desc.trim(), location: locText,
      effort, estTime: est.trim() || "Flexible", payout: Number(payout), deadline: dl,
      lat, lng,
    });
    setBusy(false);
    // In payments mode postJob redirects to Stripe (returns falsey) — don't clear here.
    if (!ok) return;
    setTitle(""); setDesc(""); setLoc(""); setEst(""); setCoords(null);
    toast("Quest posted — it's live on the board.", "success");
  }

  return (
    <div className="card post-card">
      <div className="card-head"><Plus size={18} strokeWidth={2.6} /><h2>Post a quest</h2></div>
      <p className="card-sub">Keep it small and clear — one clean task with a hard deadline.</p>

      <Field label="Title" placeholder="e.g. Jobsite cleanup — sweep & haul debris" value={title} onChange={e => setTitle(e.target.value)} />

      <div className="field-label" style={{ marginTop: 4 }}>Category</div>
      <div className="chips">
        {CATEGORIES.map(c => <Chip key={c} active={cat === c} onClick={() => setCat(c)}>{c}</Chip>)}
      </div>

      <label className="field">
        <span className="field-label">What needs doing</span>
        <textarea className="field-input field-area" rows={3} placeholder="A sentence or two. The clearer the steps, the faster it gets claimed."
          value={desc} onChange={e => setDesc(e.target.value)} />
      </label>

      <div className="grid-2">
        <div className="field">
          <span className="field-label">Location</span>
          <div className="loc-input">
            <input className="field-input" placeholder="Address or 'Remote'" value={loc}
              onChange={e => { setLoc(e.target.value); setCoords(null); }} />
            <button type="button" className="loc-btn" onClick={useMyLocation} disabled={locBusy}
              title="Use my current location" aria-label="Use my current location">
              <MapPin size={15} strokeWidth={2.4} />
            </button>
          </div>
          {coords && <span className="field-hint">📍 Pinned — workers nearby will see this quest</span>}
        </div>
        <Field label="Rough time estimate" placeholder="e.g. 2–3 hrs" value={est} onChange={e => setEst(e.target.value)} />
      </div>

      <div className="field-label" style={{ marginTop: 4 }}>Effort level</div>
      <div className="chips">
        {EFFORTS.map(e => <Chip key={e} active={effort === e} onClick={() => setEffort(e)} tone={e === "Light" ? "mint" : e === "Heavy" ? "coral" : ""}>{e}</Chip>)}
      </div>

      <div className="grid-2">
        <label className="field">
          <span className="field-label">Payout (flat)</span>
          <div className="money-wrap">
            <span className="money-sign">$</span>
            <input className="field-input field-money" type="number" min="1" value={payout} onChange={e => setPayout(e.target.value)} />
          </div>
        </label>
        <Field label="Done by (deadline)" type="datetime-local" value={deadline} min={toLocalInput(Date.now())} onChange={e => setDeadline(e.target.value)} />
      </div>

      {err && <div className="auth-err"><X size={14} strokeWidth={3} />{err}</div>}
      <Btn full size="lg" icon={Rocket} onClick={submit} disabled={busy || locBusy} sound="claim">
        {busy ? "Starting checkout…" : PAYMENTS_ENABLED ? `Pay ${money(totalCharge)} & post quest` : "Post quest to the board"}
      </Btn>
      {PAYMENTS_ENABLED && <p className="pay-note">Secure Stripe checkout — you're charged when you post, and the quest goes live the moment payment clears. Your quester earns this full payout for completing it, and cashes out to their own bank through Stripe.</p>}
    </div>
  );
}

      <Bar value={pct} tone="mint" />

      <ul className="steps">

      <div className="proof-up">

function JobChat({ job }) {
  const { user, toast } = useApp();
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([]);
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  const other = user.type === "client" ? (job.claimedByName || "your quester") : (job.postedByName || "the client");

  useEffect(() => {
    if (!open) return;
    let active = true;
    setLoading(true);
    (async () => {
      const { data } = await supabase.from("messages").select("*").eq("job_id", job.id).order("created_at", { ascending: true });
      if (active) { setMsgs((data || []).map(rowToMsg)); setLoading(false); }
    })();
    const ch = supabase.channel("chat-" + job.id)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: "job_id=eq." + job.id },
        payload => { const m = rowToMsg(payload.new); setMsgs(prev => prev.some(x => x.id === m.id) ? prev : [...prev, m]); })
      .subscribe();
    return () => { active = false; try { supabase.removeChannel(ch); } catch (e) {} };
  }, [open, job.id]);

  useEffect(() => { if (open && endRef.current) endRef.current.scrollIntoView({ behavior: "smooth", block: "end" }); }, [msgs, open]);

  async function send() {
    const body = text.trim();
    if (!body) return;
    setText("");
    const row = { job_id: job.id, sender_id: user.id, sender_name: user.name, body, created_at: Date.now() };
    const { data, error } = await supabase.from("messages").insert(row).select().single();
    if (error) { toast("Message didn't send — try again.", "error"); setText(body); return; }
    if (data) { const m = rowToMsg(data); setMsgs(prev => prev.some(x => x.id === m.id) ? prev : [...prev, m]); }
    play("click");
  }

  return (
    <div className="chat">
      <button className={`chat-toggle ${open ? "open" : ""}`} onClick={() => { setOpen(o => !o); play("toggle"); }}>
        <MessageCircle size={15} strokeWidth={2.4} /> Message {other}
        <ChevronRight size={15} className="chat-chev" />
      </button>
      {open && (
        <div className="chat-body">
          <div className="chat-msgs">
            {loading && <div className="chat-empty">Loading…</div>}
            {!loading && msgs.length === 0 && <div className="chat-empty">No messages yet — say hi 👋</div>}
            {msgs.map(m => (
              <div key={m.id} className={`bubble ${m.senderId === user.id ? "mine" : ""}`}>
                {m.senderId !== user.id && <span className="bubble-name">{m.senderName}</span>}
                <span className="bubble-text">{m.body}</span>
              </div>
            ))}
            <div ref={endRef} />
          </div>
          <div className="chat-input">
            <input value={text} onChange={e => setText(e.target.value)}
              onKeyDown={e => e.key === "Enter" && send()} placeholder={`Message ${other}…`} maxLength={1000} />
            <button className="chat-send" onClick={send} aria-label="Send message"><Send size={16} strokeWidth={2.4} /></button>
          </div>
        </div>
      )}
    </div>
  );
}

              <span>Within</span>

            <input className="rad-range" type="range" min="1" max="100" value={radius}
              onChange={e => saveSettings({ radius: Number(e.target.value) })} />

      <div className="search-row">
        <div className="search"><Search size={16} /><input placeholder="Search quests…" value={q} onChange={e => setQ(e.target.value)} /></div>

      <div className="chips chips-scroll">

      {filtered.length === 0
        ? <Empty icon={Search} title="No open quests here" body="Try another category or a wider radius — new quests land all the time." />

function Toggle({ on, onChange, label, hint, icon: Icon }) {
  return (
    <div className="trow">
      <div className="trow-l">{Icon && <Icon size={17} />}<div><div className="trow-t">{label}</div>{hint && <div className="trow-h">{hint}</div>}</div></div>
      <button className={`switch ${on ? "switch-on" : ""}`} onClick={() => { play("toggle"); onChange(!on); }} aria-pressed={on}>
        <span className="knob" />
      </button>
    </div>
  );
}

function loadIdSet(key) { try { return new Set(JSON.parse(localStorage.getItem(key) || "[]")); } catch (e) { return new Set(); } }
function saveIdSet(key, set) { try { localStorage.setItem(key, JSON.stringify(Array.from(set))); } catch (e) {} }
function ProfileMenu() {
  const { user, setView, logout, jobs, msgNotifs, refreshMsgNotifs, markMsgsSeen } = useApp();
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const isClient = user.type === "client";
  const seenKey = "sq_nseen_" + user.id;
  const dismKey = "sq_ndism_" + user.id;
  const [seen, setSeen] = useState(() => loadIdSet(seenKey));
  const [dismissed, setDismissed] = useState(() => loadIdSet(dismKey));

  const mine = jobs.filter(j => (isClient ? j.postedBy : j.claimedBy) === user.id);
  const all = [];
  if (isClient) {
    mine.filter(j => j.status === "submitted").forEach(j =>
      all.push({ id: "rev-" + j.id, icon: Eye, tone: "gold", text: `Review “${j.title}” — work submitted`, to: "jobs" }));
    mine.filter(j => j.status === "open" && j.releaseNote).forEach(j =>
      all.push({ id: "rel-" + j.id, icon: RefreshCw, tone: "muted", text: `“${j.title}” came back unfinished`, to: "jobs" }));
  } else {
    mine.filter(j => j.status === "claimed" && j.reviewNote).forEach(j =>
      all.push({ id: "chg-" + j.id, icon: RefreshCw, tone: "cyan", text: `Changes requested on “${j.title}”`, to: "tasks" }));
    const available = Math.max(0, (user.totalEarned || 0) - (user.paidOut || 0));
    if (available > 0) all.push({
      id: "pay", icon: DollarSign, tone: "mint", to: "settings",
      text: user.payoutsEnabled ? `${money(available)} ready to cash out` : `${money(available)} earned — set up payouts`,
    });
  }
  msgNotifs.forEach(m => {
    const job = jobs.find(j => j.id === m.jobId);
    all.push({
      id: "msg-" + m.jobId, icon: MessageCircle, tone: "primary", to: isClient ? "jobs" : "tasks",
      text: `${m.count} new message${m.count > 1 ? "s" : ""} from ${m.name || "someone"}${job ? " · " + job.title : ""}`,
    });
  });
  const visible = all.filter(n => !dismissed.has(n.id));
  const badge = visible.filter(n => !seen.has(n.id)).length;

  function markSeen() {
    const ids = new Set(visible.map(n => n.id));
    setSeen(ids); saveIdSet(seenKey, ids);
    // forget dismissals for notifications that no longer exist, so resolved
    // items can notify again if they ever recur.
    const cur = new Set(all.map(n => n.id));
    const keep = new Set(); let changed = false;
    dismissed.forEach(id => { if (cur.has(id)) keep.add(id); else changed = true; });
    if (changed) { setDismissed(keep); saveIdSet(dismKey, keep); }
  }
  function dismiss(id) {
    play("toggle");
    const next = new Set(dismissed); next.add(id);
    setDismissed(next); saveIdSet(dismKey, next);
  }
  function clearAll() {
    play("toggle");
    const next = new Set(dismissed); visible.forEach(n => next.add(n.id));
    setDismissed(next); saveIdSet(dismKey, next);
  }

  function close() { setOpen(false); markMsgsSeen(); }
  function toggle() { if (open) close(); else { setOpen(true); play("pop"); refreshMsgNotifs(); markSeen(); } }
  function go(to) { setView(to); close(); }

  useEffect(() => {
    if (!open) return;
    const onDoc = e => { if (ref.current && !ref.current.contains(e.target)) close(); };
    const onKey = e => { if (e.key === "Escape") close(); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
    /* eslint-disable-next-line */
  }, [open]);

  const shortcuts = isClient
    ? [["Post a quest", Plus, "post"], ["My quests", Briefcase, "jobs"], ["Settings", Settings, "settings"]]
    : [["Browse quests", Search, "browse"], ["My tasks", ListChecks, "tasks"], ["Rewards", Trophy, "rewards"], ["Earnings & payouts", DollarSign, "settings"], ["Settings", Settings, "settings"]];

  return (
    <div className="profile-menu" ref={ref}>
      <button className={`nav-user ${open ? "on" : ""}`} onClick={toggle} aria-label="Profile & notifications">
        <span className="nav-ava">{(user.name || "?")[0]}</span>
        {badge > 0 && <span className="notif-badge">{badge > 9 ? "9+" : badge}</span>}
      </button>
      {open && (
        <div className="pm-pop">
          <div className="pm-head">
            <span className="nav-ava lg">{(user.name || "?")[0]}</span>
            <div className="pm-id">
              <div className="pm-name">{user.name}</div>
              <div className="pm-sub">{user.email} · {isClient ? "Client" : "Quester"}</div>
            </div>
          </div>

          <div className="pm-sect-t pm-sect-row">
            <span>Notifications</span>
            {visible.length > 0 && <button className="pm-clear" onClick={clearAll}>Clear all</button>}
          </div>
          <div className="pm-notifs">
            {visible.length === 0
              ? <div className="pm-empty">You're all caught up ✨</div>
              : visible.map(n => {
                const NIcon = n.icon;
                return (
                  <div key={n.id} className="pm-notif">
                    <button className="pm-ntap" onClick={() => go(n.to)}>
                      <span className={`pm-nic tone-${n.tone}`}><NIcon size={14} strokeWidth={2.5} /></span>
                      <span className="pm-ntext">{n.text}</span>
                    </button>
                    <button className="pm-nx" onClick={() => dismiss(n.id)} aria-label="Dismiss notification"><X size={13} strokeWidth={2.6} /></button>
                  </div>
                );
              })}
          </div>

          <div className="pm-sect-t">Shortcuts</div>
          <div className="pm-links">
            {shortcuts.map(([label, Icon, to]) => (
              <button key={to + label} className="pm-link" onClick={() => go(to)}>
                <Icon size={15} strokeWidth={2.3} /><span>{label}</span>
              </button>
            ))}
            <button className="pm-link danger" onClick={() => { setOpen(false); logout(); }}>
              <LogOut size={15} strokeWidth={2.3} /><span>Log out</span>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
